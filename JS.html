<script>
  // 메뉴별 메인 영역 템플릿(Placeholder)
  // 장시간 학습에도 눈이 피로하지 않도록 차분한 색상(slate/muted 계열 등) 활용
  const pages = {
    // write는 template 태그(page-write-template)에 의해 대체됩니다.
    analyze: `
      <div class="fade-in space-y-6">
        <h2 class="text-2xl font-bold tracking-tight text-primary">학습 분석</h2>
        <div class="p-6 bg-surface rounded-xl border border-border shadow-sm">
          <p class="text-sm font-semibold text-secondary mb-3 border-b border-border pb-2">취약점 분석</p>
          <div class="bg-bg p-8 rounded-lg border border-dashed border-border flex items-center justify-center min-h-[200px]">
            <p class="text-sm text-muted text-center">이곳에 학습 분석 차트(Chart.js 등 활용)와 통계 정보가 들어갑니다.</p>
          </div>
        </div>
      </div>
    `,
    solve: `
      <div class="fade-in space-y-6">
        <h2 class="text-2xl font-bold tracking-tight text-primary">문제풀이</h2>
        <div class="p-6 bg-surface rounded-xl border border-border shadow-sm">
          <p class="text-sm font-semibold text-secondary mb-3 border-b border-border pb-2">연습 모드</p>
          <div class="bg-bg p-8 rounded-lg border border-dashed border-border flex items-center justify-center min-h-[200px]">
            <p class="text-sm text-muted text-center">이곳에 문제풀이 화면(개별 문제 풀이, 정답/해설 즉시 확인 등)이 들어갑니다.</p>
          </div>
        </div>
      </div>
    `,
    exam: `
      <div class="fade-in space-y-6">
        <h2 class="text-2xl font-bold tracking-tight text-primary">모의시험</h2>
        <div class="p-6 bg-surface rounded-xl border border-border shadow-sm">
          <p class="text-sm font-semibold text-secondary mb-3 border-b border-border pb-2">실전 테스트</p>
          <div class="bg-bg p-8 rounded-lg border border-dashed border-border flex items-center justify-center min-h-[200px]">
            <p class="text-sm text-muted text-center">이곳에 모의시험 인터페이스(문제 제공, 타이머, 제출 버튼 등)가 들어갑니다.</p>
          </div>
        </div>
      </div>
    `
  };

  function navigate(pageId) {
    // 메인 컨테이너 내용 교체
    const mainContainer = document.getElementById('main-container');
    
    // 템플릿 태그가 있는지 확인 (예: page-write-template)
    const templateId = 'page-' + pageId + '-template';
    const templateElement = document.getElementById(templateId);
    
    if (templateElement) {
      mainContainer.innerHTML = templateElement.innerHTML;
    } else {
      mainContainer.innerHTML = pages[pageId] || '<p class="text-center text-muted my-10">해당 페이지를 찾을 수 없습니다.</p>';
    }

    // 탭 선택/해제 상태 업데이트
    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(tab => {
      // 초기화 상태
      tab.classList.remove('text-primary', 'font-bold', 'fold:bg-slate-100');
      tab.classList.add('text-muted', 'hover:text-primary', 'fold:hover:bg-slate-50');
      
      // 활성화 상태
      if (tab.id === 'tab-' + pageId) {
        tab.classList.remove('text-muted', 'hover:text-primary', 'fold:hover:bg-slate-50');
        tab.classList.add('text-primary', 'font-bold', 'fold:bg-slate-100');
      }
    });

    // 화면 최상단으로 스크롤 이동
    document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
  }

  /**
   * 문제 폼 전송 핸들러
   */
  async function submitQuestion(event) {
    event.preventDefault();
    
    const form = event.target;
    const submitBtn = document.getElementById('submit-btn');
    
    // 버튼 비활성화 (로딩 상태)
    const originalBtnText = submitBtn.innerText;
    submitBtn.disabled = true;
    submitBtn.innerText = '저장 중...';
    
    try {
      // 폼 데이터 수집
      const formData = new FormData(form);
      
      const questionType = formData.get('question_type');
      let optionsList = null;

      // 객관식일 경우 options 데이터를 배열로 수집
      if (questionType === 'MULTIPLE_CHOICE') {
        optionsList = [];
        const optionEls = form.querySelectorAll('input[name="options"]');
        optionEls.forEach(el => {
          if(el.value.trim() !== '') optionsList.push(el.value.trim());
        });
      }

      // 정답 데이터 (배열 형태 변환, 단일 정답도 배열로 수집되도록 통일)
      const answerRaw = formData.get('answer') || '';
      const answerArr = answerRaw.split(',').map(s => s.trim()).filter(s => s !== '');

      // 명세서 규격에 맞춘 payload
      const data = {
        major_subject: formData.get('major_subject'),
        minor_subject: formData.get('minor_subject'),
        question_title: formData.get('question_title'),
        question_type: questionType,
        content: formData.get('content'),
        options: optionsList,
        answer: answerArr.length > 0 ? JSON.stringify(answerArr) : null,
        hint_explanation: formData.get('hint_explanation')
      };
      
      // 이미지 Base64 변환 (있는 경우)
      const imageFile = formData.get('imageFile');
      if (imageFile && imageFile.size > 0) {
        data.imageBase64 = await toBase64(imageFile);
      }
      
      // 구글 앱스 스크립트 호출
      google.script.run
        .withSuccessHandler((response) => {
          submitBtn.disabled = false;
          submitBtn.innerText = originalBtnText;
          
          if (response && response.success) {
            alert('문제가 성공적으로 저장되었습니다!');
            form.reset(); // 폼 초기화
          } else {
            alert('저장 실패: ' + (response ? response.message : '알 수 없는 오류'));
          }
        })
        .withFailureHandler((error) => {
          submitBtn.disabled = false;
          submitBtn.innerText = originalBtnText;
          console.error(error);
          alert('서버 오류로 인해 저장에 실패했습니다.');
        })
        .router({ action: 'createQuestion', payload: data });
        
    } catch (error) {
      submitBtn.disabled = false;
      submitBtn.innerText = originalBtnText;
      console.error(error);
      alert('오류가 발생했습니다.');
    }
  }

  /**
   * File 객체를 Base64 문자열로 변환하는 유틸리티 함수
   */
  /**
   * 문제 유형 변경 시 보기 영역 표시 여부를 토글합니다.
   */
  function toggleOptionsArea() {
    const typeSelect = document.getElementById('question_type');
    const optionsArea = document.getElementById('options-area');
    const optionInputs = document.querySelectorAll('.option-input');
    
    if (typeSelect && optionsArea) {
      if (typeSelect.value === 'MULTIPLE_CHOICE') {
        optionsArea.style.display = 'block';
        // HTML5 required 속성은 JS에서 제어하지 않고 필수 입력 해제 상태로 둡니다.
      } else {
        optionsArea.style.display = 'none';
        optionInputs.forEach(input => input.value = ''); // 값 초기화
      }
    }
  }

  /**
   * File 객체를 Base64 문자열로 변환하는 유틸리티 함수
   */
  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }

  // 초기화 (앱 로딩 후 화면 기본 세팅)
  document.addEventListener('DOMContentLoaded', () => {
    navigate('write');
  });
</script>
