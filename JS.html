<script>
  /**
   * 전역 상태 및 라우팅 로직 (Core)
   */
  var allQuestions = []; // 전체 문제 데이터 (v53)
  var isGlobalDataDirty = false; // 데이터 최신화 필요 여부 (v58)
  var currentDetailQuestion = null;
  var isEditMode = false;

  const pages = {
    solve: `
      <div class="fade-in space-y-6">
        <h2 class="text-2xl font-bold tracking-tight text-primary">문제풀이</h2>
        <div class="p-6 bg-surface rounded-xl border border-border shadow-sm">
          <p class="text-sm font-semibold text-secondary mb-3 border-b border-border pb-2">연습 모드</p>
          <div class="bg-bg p-8 rounded-lg border border-dashed border-border flex items-center justify-center min-h-[200px]">
            <p class="text-sm text-muted text-center">이곳에 문제풀이 화면이 들어갑니다.</p>
          </div>
        </div>
      </div>
    `,
    exam: `
      <div class="fade-in space-y-6">
        <h2 class="text-2xl font-bold tracking-tight text-primary">모의시험</h2>
        <div class="p-6 bg-surface rounded-xl border border-border shadow-sm">
          <p class="text-sm font-semibold text-secondary mb-3 border-b border-border pb-2">실전 테스트</p>
          <div class="bg-bg p-8 rounded-lg border border-dashed border-border flex items-center justify-center min-h-[200px]">
            <p class="text-sm text-muted text-center">이곳에 모의시험 인터페이스가 들어갑니다.</p>
          </div>
        </div>
      </div>
    `
  };

  function navigate(pageId) {
    const mainContainer = document.getElementById('main-container');
    const templateId = 'page-' + pageId + '-template';
    const templateElement = document.getElementById(templateId);
    
    if (templateElement) {
      mainContainer.innerHTML = templateElement.innerHTML;
      if (pageId === 'analyze') {
        if (typeof loadManageList === 'function') loadManageList();
      } else if (pageId === 'write') {
        if (typeof resetQuestionForm === 'function') resetQuestionForm();
      } else if (pageId === 'solve') {
        if (typeof initSolvePage === 'function') initSolvePage();
      }
    } else {
      mainContainer.innerHTML = pages[pageId] || '<p class="text-center text-muted my-10">해당 페이지를 찾을 수 없습니다.</p>';
    }

    // 탭 UI 업데이트 (v83: 시맨틱 .active 클래스 활용)
    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(tab => {
      tab.classList.remove('active');
      if (tab.id === 'tab-' + pageId) {
        tab.classList.add('active');
      }
    });

    document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
  }

  /**
   * 전역 유틸리티 함수
   */
  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return `${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }

  function loadGlobalData(callback, forceSync = false) {
    console.log('[DEBUG] Loading global data (Sync=' + forceSync + ')...');
    google.script.run
      .withSuccessHandler(function(response) {
        if (response && response.status === 'success') {
          allQuestions = response.data || [];
          isGlobalDataDirty = false; // 로드 성공 시 Dirty 상태 해제
          console.log('[DEBUG] Global Data Loaded:', allQuestions.length, 'items');
          if (callback) callback(allQuestions);
        } else {
          console.error('글로벌 데이터 로드 실패');
          if (callback) callback([]);
        }
      })
      .withFailureHandler(function(error) {
        console.error('서버 통신 오류:', error);
        if (callback) callback([]);
      })
      .getQuestionsWithAnalytics(forceSync);
  }

  /**
   * v68: 다크모드 테마 관리
   */
  function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    console.log('[DEBUG] Theme toggled:', isDark ? 'Dark' : 'Light');
  }

  function applySavedTheme() {
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  }

  // 초기화
  document.addEventListener('DOMContentLoaded', () => {
    applySavedTheme(); // v68: 테마 초기화
    loadGlobalData(() => {
      // 데이터 로드 완료 후 첫 페이지로 이동
      navigate('write');
    });
  });
  /**
   * 실시간 마크다운 미리보기 패널 (v91: 비차단형)
   */
  let previewTargetId = null;

  function openMarkdownPreview(targetId) {
    const el = document.getElementById(targetId);
    if (!el) return;
    
    previewTargetId = targetId;
    const modal = document.getElementById('markdown-preview-panel');
    if (modal) {
      modal.classList.remove('hidden');
      updateMarkdownPreviewNow();
    }
    
    // 실시간 감지를 위해 oninput 이벤트 연결 (한 번만)
    if (!el.dataset.previewBound) {
      el.addEventListener('input', updateMarkdownPreviewNow);
      el.dataset.previewBound = "true";
    }
  }

  function updateMarkdownPreviewNow() {
    if (!previewTargetId) return;
    const el = document.getElementById(previewTargetId);
    const modal = document.getElementById('markdown-preview-panel');
    const display = modal ? modal.querySelector('.markdown-body') : null;
    
    if (el && display) {
      const rawText = el.value || '내용이 없습니다.';
      display.innerHTML = marked.parse(rawText);
    }
  }

  function closeMarkdownPreview() {
    const modal = document.getElementById('markdown-preview-panel');
    if (modal) modal.classList.add('hidden');
    previewTargetId = null;
  }
</script>
