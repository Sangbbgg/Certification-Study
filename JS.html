<script>
  /**
   * 전역 상태 및 라우팅 로직 (Core)
   */
  var allQuestions = []; // 전체 문제 데이터 (v53)
  var isGlobalDataDirty = false; // 데이터 최신화 필요 여부 (v58)
  var currentDetailQuestion = null;
  var isEditMode = false;

  const pages = {
    solve: `
      <div class="fade-in space-y-6">
        <h2 class="text-2xl font-bold tracking-tight text-primary">문제풀이</h2>
        <div class="p-6 bg-surface rounded-xl border border-border shadow-sm">
          <p class="text-sm font-semibold text-secondary mb-3 border-b border-border pb-2">연습 모드</p>
          <div class="bg-bg p-8 rounded-lg border border-dashed border-border flex items-center justify-center min-h-[200px]">
            <p class="text-sm text-muted text-center">이곳에 문제풀이 화면이 들어갑니다.</p>
          </div>
        </div>
      </div>
    `,
    exam: `
      <div class="fade-in space-y-6">
        <h2 class="text-2xl font-bold tracking-tight text-primary">모의시험</h2>
        <div class="p-6 bg-surface rounded-xl border border-border shadow-sm">
          <p class="text-sm font-semibold text-secondary mb-3 border-b border-border pb-2">실전 테스트</p>
          <div class="bg-bg p-8 rounded-lg border border-dashed border-border flex items-center justify-center min-h-[200px]">
            <p class="text-sm text-muted text-center">이곳에 모의시험 인터페이스가 들어갑니다.</p>
          </div>
        </div>
      </div>
    `
  };

  function navigate(pageId) {
    const mainContainer = document.getElementById('main-container');
    const templateId = 'page-' + pageId + '-template';
    const templateElement = document.getElementById(templateId);
    
    if (templateElement) {
      mainContainer.innerHTML = templateElement.innerHTML;
      if (pageId === 'analyze') {
        if (typeof loadManageList === 'function') loadManageList();
      } else if (pageId === 'write') {
        if (typeof resetQuestionForm === 'function') resetQuestionForm();
      } else if (pageId === 'solve') {
        if (typeof initSolvePage === 'function') initSolvePage();
      }
    } else {
      mainContainer.innerHTML = pages[pageId] || '<p class="text-center text-muted my-10">해당 페이지를 찾을 수 없습니다.</p>';
    }

    // 탭 UI 업데이트
    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(tab => {
      tab.classList.remove('text-primary', 'font-bold', 'fold:bg-slate-100');
      tab.classList.add('text-muted', 'hover:text-primary', 'fold:hover:bg-slate-50');
      if (tab.id === 'tab-' + pageId) {
        tab.classList.remove('text-muted', 'hover:text-primary', 'fold:hover:bg-slate-50');
        tab.classList.add('text-primary', 'font-bold', 'fold:bg-slate-100');
      }
    });

    document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
  }

  /**
   * 전역 유틸리티 함수
   */
  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return `${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }

  /**
   * 글로벌 데이터 로드 (v53/v58)
   * 앱 실행 시 1회만 호출하여 전체 데이터를 메모리에 저장
   * @param {function} callback - 로드 완료 후 실행할 콜백
   * @param {boolean} forceSync - true일 경우 서버에서 통계를 재계산함
   */
  function loadGlobalData(callback, forceSync = false) {
    console.log('[DEBUG] Loading global data (Sync=' + forceSync + ')...');
    google.script.run
      .withSuccessHandler(function(response) {
        if (response && response.status === 'success') {
          allQuestions = response.data || [];
          isGlobalDataDirty = false; // 로드 성공 시 Dirty 상태 해제
          console.log('[DEBUG] Global Data Loaded:', allQuestions.length, 'items');
          if (callback) callback(allQuestions);
        } else {
          console.error('글로벌 데이터 로드 실패');
          if (callback) callback([]);
        }
      })
      .withFailureHandler(function(error) {
        console.error('서버 통신 오류:', error);
        if (callback) callback([]);
      })
      .getQuestionsWithAnalytics(forceSync);
  }

  // 초기화
  document.addEventListener('DOMContentLoaded', () => {
    loadGlobalData(() => {
      // 데이터 로드 완료 후 첫 페이지로 이동
      navigate('write');
    });
  });
</script>
