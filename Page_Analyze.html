<template id="page-analyze-template">
  <div class="fade-in space-y-6">
    <h2 class="text-2xl font-bold tracking-tight text-primary">문제관리 & 분석</h2>

    <!-- 리스트 영역 -->
    <div id="manage-list-area" class="p-6 bg-surface rounded-xl border border-border shadow-sm">
      <div class="flex justify-between items-center mb-5 border-b border-border pb-2">
        <p class="text-sm font-semibold text-secondary">문제 목록</p>
        <button onclick="loadManageList(true)"
          class="text-xs bg-bg text-primary px-3 py-1.5 rounded flex items-center border border-border">
          <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
            </path>
          </svg>
          새로고침
        </button>
      </div>

      <!-- 필터 영역 -->
      <div class="flex flex-wrap gap-4 mb-6 p-4 bg-bg rounded-xl border border-dashed border-border">
        <div class="flex-1 min-w-[200px]">
          <label class="block text-[10px] font-bold text-muted uppercase tracking-tight mb-1 ml-1">대분류 필터</label>
          <select id="filter-major" onchange="onMajorFilterChange()"
            class="w-full px-3 py-2 border border-border rounded-lg text-sm bg-surface focus:ring-1 focus:ring-accent outline-none">
            <option value="">전체 대분류</option>
          </select>
        </div>
        <div class="flex-1 min-w-[200px]">
          <label class="block text-[10px] font-bold text-muted uppercase tracking-tight mb-1 ml-1">소분류 필터</label>
          <select id="filter-minor" onchange="onMinorFilterChange()"
            class="w-full px-3 py-2 border border-border rounded-lg text-sm bg-surface focus:ring-1 focus:ring-accent outline-none">
            <option value="">전체 소분류</option>
          </select>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
          <thead>
            <tr class="text-xs text-muted uppercase border-b border-border">
              <th class="px-4 py-3 font-medium">문제명</th>
              <th class="px-4 py-3 font-medium text-center">최종 풀이</th>
              <th class="px-4 py-3 font-medium text-center">정답률</th>
              <th class="px-4 py-3 font-medium text-right">관리</th>
            </tr>
          </thead>
          <tbody id="manage-list-body" class="divide-y divide-border">
            <tr>
              <td colspan="4" class="px-4 py-10 text-center text-muted">데이터를 불러오는 중...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 상세 및 수정 영역 (초기 숨김) -->
    <div id="manage-detail-area" class="p-6 bg-surface rounded-xl border border-border shadow-sm space-y-6"
      style="display: none;">
      <div class="flex justify-between items-center border-b border-border pb-2">
        <button onclick="backToList()"
          class="text-sm text-secondary hover:text-primary flex items-center transition-colors">
          <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
            </path>
          </svg>
          목록으로 돌아가기
        </button>
        <div class="flex items-center space-x-3">
          <span class="text-sm font-medium text-text">수정 모드</span>
          <button onclick="toggleEditMode()" id="edit-toggle"
            class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-muted/20">
            <span id="edit-toggle-slider"
              class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-0"></span>
          </button>
        </div>
      </div>

      <form id="edit-question-form" onsubmit="updateQuestion(event)" class="space-y-5">
        <input type="hidden" id="edit-id" name="id">
        <div id="detail-content-wrapper" class="space-y-5"></div>

        <div id="edit-actions" class="pt-4 flex justify-end space-x-3" style="display: none;">
          <button type="button" onclick="cancelEdit()"
            class="px-4 py-2 border border-border rounded-lg text-sm font-medium hover:bg-bg transition-colors">취소</button>
          <button type="submit" id="update-btn" class="bg-accent text-white font-bold py-2 px-6 rounded-lg shadow-sm">수정
            사항 저장</button>
        </div>
      </form>
    </div>
  </div>
</template>

<script>
  /**
   * 문제 관리 및 분석 페이지 전용 로직
   */

  function renderManageList(questions) {
    const listBody = document.getElementById('manage-list-body');
    if (!listBody) return;

    if (questions.length === 0) {
      listBody.innerHTML = '<tr><td colspan="4" class="px-4 py-10 text-center text-muted">등록된 문제가 없습니다.</td></tr>';
      return;
    }

    listBody.innerHTML = questions.map(q => `
      <tr class="hover:bg-bg transition-colors cursor-pointer group" onclick="viewQuestionDetail('${q.id}')">
        <td class="px-4 py-4">
          <div class="font-medium text-primary group-hover:text-accent transition-colors truncate max-w-[200px] md:max-w-md">${q.question_title}</div>
          <div class="text-xs text-muted">${q.major_subject} > ${q.minor_subject}</div>
        </td>
        <td class="px-4 py-4 text-center text-xs text-secondary whitespace-nowrap">${formatDate(q.last_solved_at)}</td>
        <td class="px-4 py-4 text-center">
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${q.accuracy_rate >= 80 ? 'bg-green-100 text-green-800' : q.accuracy_rate >= 50 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800'}">
            ${q.accuracy_rate}%
          </span>
        </td>
        <td class="px-4 py-4 text-right whitespace-nowrap" onclick="event.stopPropagation()">
          <button onclick="viewQuestionDetail('${q.id}')" class="icon-btn mr-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
          <button onclick="deleteQuestion('${q.id}')" class="icon-btn text-red-400 hover:text-red-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
        </td>
      </tr>
    `).join('');
  }

  function loadManageList(forceRefresh) {
    const listBody = document.getElementById('manage-list-body');
    if (!listBody) return;

    // v58: 데이터 상태(isGlobalDataDirty) 및 강제 새로고침 체크
    if (forceRefresh || allQuestions.length === 0 || isGlobalDataDirty) {
      const isSyncNeeded = isGlobalDataDirty; // Dirty 상태일 때만 서버 측 Sync 트리거
      listBody.innerHTML = '<tr><td colspan="4" class="px-4 py-10 text-center text-muted">데이터를 최신화하는 중...</td></tr>';

      console.log('[DEBUG] Analyze Page: Loading new data. SyncNeeded=' + isSyncNeeded);
      loadGlobalData(function (data) {
        updateFilterOptions(data);
        renderManageList(data);
      }, isSyncNeeded);
      return;
    }

    // 이미 데이터가 있고 깨끗하면 즉시 렌더링
    console.log('[DEBUG] Analyze Page: Using cached data');
    updateFilterOptions(allQuestions);
    renderManageList(allQuestions);
  }

  function updateFilterOptions(data, selectedMajor = "") {
    const majorSelect = document.getElementById('filter-major');
    const minorSelect = document.getElementById('filter-minor');
    if (!majorSelect || !minorSelect) return;

    // 대분류 목록 초기화 (1회만)
    if (majorSelect.options.length <= 1) {
      const majors = [...new Set(data.map(q => q.major_subject))].sort();
      majorSelect.innerHTML = '<option value="">전체 대분류</option>' +
        majors.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    // 현재 선택된 소분류 기억
    const currentMinor = minorSelect.value;

    // 선택된 대분류에 속한 소분류들만 추출
    let minors = [];
    data.forEach(q => {
      if (!selectedMajor || q.major_subject === selectedMajor) {
        if (!minors.includes(q.minor_subject)) minors.push(q.minor_subject);
      }
    });
    minors.sort();

    minorSelect.innerHTML = '<option value="">전체 소분류</option>' +
      minors.map(m => `<option value="${m}" ${m === currentMinor ? 'selected' : ''}>${m}</option>`).join('');
  }

  function onMajorFilterChange() {
    const majorSelect = document.getElementById('filter-major');
    const minorSelect = document.getElementById('filter-minor');
    const major = majorSelect.value;

    // v64: 대분류 변경 시 소분류를 '전체'("")로 초기화
    if (minorSelect) minorSelect.value = "";

    // 대분류 변경 시 소분류 목록 갱신 (계단식 필터)
    updateFilterOptions(allQuestions, major);
    applyFilters();
  }

  function onMinorFilterChange() {
    const majorSelect = document.getElementById('filter-major');
    const minorSelect = document.getElementById('filter-minor');
    const minor = minorSelect.value;

    if (minor) {
      // 소분류에 해당하는 첫 번째 문제의 대분류를 찾아 자동 선택
      const matched = allQuestions.find(q => q.minor_subject === minor);
      if (matched && majorSelect.value !== matched.major_subject) {
        majorSelect.value = matched.major_subject;
        // 대분류가 바뀌었으므로 소분류 목록도 해당 대분류 기준으로 다시 재구성
        updateFilterOptions(allQuestions, matched.major_subject);
        minorSelect.value = minor; // 소분류 값 유지
      }
    }
    applyFilters();
  }

  function applyFilters() {
    const majorSelect = document.getElementById('filter-major');
    const minorSelect = document.getElementById('filter-minor');
    const major = majorSelect.value;
    const minor = minorSelect.value;

    let filtered = allQuestions;
    if (major) filtered = filtered.filter(q => q.major_subject === major);
    if (minor) filtered = filtered.filter(q => q.minor_subject === minor);
    renderManageList(filtered);
  }

  function viewQuestionDetail(questionId) {
    const question = allQuestions.find(q => q.id === questionId);
    if (!question) return;
    currentDetailQuestion = question;
    isEditMode = false;
    const listArea = document.getElementById('manage-list-area');
    const detailArea = document.getElementById('manage-detail-area');
    if (listArea) listArea.style.display = 'none';
    if (detailArea) detailArea.style.display = 'block';
    renderDetailContent(question, false);
    updateEditToggleUI(false);
  }

  function backToList() {
    const listArea = document.getElementById('manage-list-area');
    const detailArea = document.getElementById('manage-detail-area');
    if (listArea) listArea.style.display = 'block';
    if (detailArea) detailArea.style.display = 'none';
    currentDetailQuestion = null;
  }

  function toggleEditMode() {
    isEditMode = !isEditMode;
    updateEditToggleUI(isEditMode);
    renderDetailContent(currentDetailQuestion, isEditMode);
  }

  function updateEditToggleUI(isEnabled) {
    const slider = document.getElementById('edit-toggle-slider');
    const toggle = document.getElementById('edit-toggle');
    const actions = document.getElementById('edit-actions');
    const form = document.getElementById('edit-question-form');
    if (slider && toggle && actions) {
      // v87: 상태와 관계없이 슬라이더 색상은 테마에 맞춰 상시 고정 (가시성 확보)
      slider.classList.remove('bg-white');
      slider.classList.add('bg-slate-700', 'dark:bg-slate-100');

      if (isEnabled) {
        slider.classList.replace('translate-x-0', 'translate-x-5');
        // v88: 켜졌을 때는 테마색(blue)
        toggle.classList.remove('bg-slate-300', 'dark:bg-slate-600', 'bg-muted/20');
        toggle.classList.add('bg-accent');
        actions.style.display = 'flex';
        // v79: 수정 모드 활성화 시 폼 컨테이너에 전용 클래스 추가
        if (form) form.classList.add('edit-mode-active', 'p-6', 'rounded-xl');
      } else {
        slider.classList.replace('translate-x-5', 'translate-x-0');
        // v88: 꺼졌을 때는 더욱 명확한 회색 적용
        toggle.classList.remove('bg-accent');
        toggle.classList.add('bg-slate-300', 'dark:bg-slate-600');
        actions.style.display = 'none';
        if (form) form.classList.remove('edit-mode-active', 'p-6', 'rounded-xl');
      }
    }
  }

  function renderDetailContent(q, isEdit) {
    const wrapper = document.getElementById('detail-content-wrapper');
    if (!wrapper) return;
    let contentToRender = q.content || '';
    contentToRender = contentToRender.replace(/'''/g, '```');

    if (isEdit) {
      let editImageUrl = q.image_url || '';
      if (editImageUrl.includes('google')) {
        const idMatch = editImageUrl.match(/(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})/);
        if (idMatch) editImageUrl = 'https://lh3.googleusercontent.com/d/' + idMatch[1];
      }
      let imagePreviewHtml = q.image_url ? `
        <div class="relative inline-block group">
          <img src="${editImageUrl}" class="max-h-64 h-auto w-auto rounded-lg border border-border shadow-md">
          <button type="button" onclick="removeImageFromQuestion()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md hover:bg-red-600 transition-colors">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
          <p class="text-[10px] text-muted mt-1">현재 등록된 이미지</p>
        </div>` : '<p class="text-xs text-muted">등록된 이미지가 없습니다.</p>';

      wrapper.innerHTML = `
        <input type="hidden" id="remove-image-flag" name="remove_image" value="false">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div><label class="block text-xs font-medium text-muted mb-1">대과목</label>
               <input type="text" name="major_subject" value="${q.major_subject}" required class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:ring-1 focus:ring-accent outline-none"></div>
          <div><label class="block text-xs font-medium text-muted mb-1">소과목</label>
               <input type="text" name="minor_subject" value="${q.minor_subject}" required class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:ring-1 focus:ring-accent outline-none"></div>
        </div>
        <div><label class="block text-xs font-medium text-muted mb-1">문제명</label>
             <input type="text" name="question_title" value="${q.question_title}" required class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:ring-1 focus:ring-accent outline-none"></div>
        <div>
          <div class="flex justify-between items-end mb-1">
            <label class="block text-xs font-medium text-muted">지문 (마크다운)</label>
            <button type="button" onclick="openMarkdownPreview('edit-content')" class="text-[10px] bg-bg text-accent border border-accent/30 px-2 py-0.5 rounded hover:bg-accent hover:text-white transition-all flex items-center">
              <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
              미리보기
            </button>
          </div>
          <textarea id="edit-content" name="content" rows="8" required class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:ring-1 focus:ring-accent outline-none font-mono bg-surface transition-all">${q.content}</textarea>
        </div>
        <div id="image-edit-section" class="space-y-3 p-4 bg-bg rounded-xl border border-dashed border-border">
          <label class="block text-xs font-bold text-primary uppercase tracking-tight">이미지 관리</label>
          <div id="current-image-preview">${imagePreviewHtml}</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label class="block text-[10px] font-medium text-muted mb-1">이미지 위치</label>
                 <select name="image_position" class="w-full px-3 py-1.5 border border-border rounded-lg text-sm bg-surface outline-none transition-all">
                   <option value="TOP" ${q.image_position === 'TOP' ? 'selected' : ''}>지문 위 (TOP)</option>
                   <option value="BOTTOM" ${q.image_position !== 'TOP' ? 'selected' : ''}>지문 아래 (BOTTOM)</option>
                 </select></div>
            <div><label class="block text-[10px] font-medium text-muted mb-1">새 이미지 업로드</label>
                 <input type="file" name="imageFile" accept="image/*" class="w-full text-xs"></div>
          </div>
        </div>
        <div id="options-edit-section" class="p-4 bg-accent/10 rounded-xl border border-accent/20 mt-4">
          <label class="block text-xs font-bold text-blue-600 uppercase mb-3">정답 및 보기 설정</label>
          ${q.question_type === 'MULTIPLE_CHOICE' ? `
            <div id="edit-options-list" class="space-y-2">
              ${(q.options || []).map((opt, idx) => `<div class="flex items-center gap-2">
                <input type="radio" name="edit_correct_answer" value="${idx}" ${String(idx) === String(q.answer) ? 'checked' : ''}>
                <input type="text" name="edit_option_text" value="${opt}" class="flex-1 px-3 py-1.5 border border-border rounded-lg text-sm bg-surface">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-400 px-1">✕</button>
              </div>`).join('')}
            </div><button type="button" onclick="addOptionToEdit()" class="mt-2 text-xs text-accent font-bold">+ 보기 추가</button>` : `
            <textarea name="edit_answer_text" rows="4" class="w-full px-3 py-2 border border-border rounded-lg text-sm bg-surface font-mono resize-y">${Array.isArray(q.answer) ? q.answer.join(', ') : (q.answer || '')}</textarea>`}
        </div>
        <div>
          <div class="flex justify-between items-end mb-1">
            <label class="block text-xs font-medium text-muted">해설 (마크다운)</label>
            <button type="button" onclick="openMarkdownPreview('edit-hint')" class="text-[10px] bg-bg text-accent border border-accent/30 px-2 py-0.5 rounded hover:bg-accent hover:text-white transition-all flex items-center">
              <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
              미리보기
            </button>
          </div>
          <textarea id="edit-hint" name="hint_explanation" rows="4" required class="w-full px-3 py-2 border border-border rounded-lg text-sm outline-none font-mono bg-surface focus:ring-1 focus:ring-accent transition-all">${q.hint_explanation || ''}</textarea>
        </div>
      `;
      document.getElementById('edit-id').value = q.id;
    } else {
      let renderedContent = contentToRender;
      let renderedHint = q.hint_explanation || '해설이 없습니다.';
      let imageHtml = '';
      if (q.image_url) {
        let finalImageUrl = q.image_url;
        const match = q.image_url.match(/(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})/);
        if (match && q.image_url.includes('google')) finalImageUrl = `https://lh3.googleusercontent.com/d/${match[1]}`;
        imageHtml = `<div class="flex justify-center my-4"><img src="${finalImageUrl}" class="rounded-xl border border-border shadow-lg max-w-full h-auto"></div>`;
      }
      if (typeof marked !== 'undefined') {
        try {
          const renderer = new marked.Renderer();
          renderer.image = function (arg) {
            let href = typeof arg === 'object' ? arg.href : arg;
            const match = href.match(/(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})/);
            if (match && href.includes('google')) href = `https://lh3.googleusercontent.com/d/${match[1]}`;
            return `<img src="${href}" class="rounded-xl border border-border shadow-sm my-4 mx-auto block max-w-full h-auto">`;
          };
          const cleanText = contentToRender.replace(/!\[.*?\]\(.*?\)/g, "").trim();
          renderedContent = marked.parse(cleanText, { renderer });
          renderedHint = marked.parse(renderedHint.replace(/'''/g, '```'), { renderer });
        } catch (e) {
          console.error('[ERROR] Markdown parsing error:', e);
        }
      }
      wrapper.innerHTML = `
        <div class="flex flex-wrap gap-2 mb-2">
          <span class="px-2 py-1 bg-bg text-secondary rounded text-[10px] font-bold uppercase tracking-wider">${q.major_subject}</span>
          <span class="px-2 py-1 bg-bg text-secondary rounded text-[10px] font-bold uppercase tracking-wider border border-border">${q.minor_subject}</span>
          <span class="px-2 py-1 bg-blue-50 text-blue-500 rounded text-[10px] font-bold uppercase tracking-wider border border-blue-100">${q.question_type}</span>
        </div>
        <h3 class="text-xl font-black text-primary mb-6 leading-tight">${q.question_title}</h3>
        <div class="space-y-6">
          ${q.image_position === 'TOP' ? imageHtml : ''}
          <div class="markdown-body prose prose-slate max-w-none text-secondary leading-relaxed">${renderedContent}</div>
          ${q.image_position !== 'TOP' ? imageHtml : ''}
        </div>
        <div class="grid grid-cols-2 gap-4 mt-8">
          <div class="bg-surface p-4 rounded-xl border border-border flex flex-col items-center">
            <span class="text-2xl font-black text-primary">${q.accuracy_rate}%</span>
            <span class="text-[10px] text-muted font-bold">평균 정답률</span>
          </div>
          <div class="bg-surface p-4 rounded-xl border border-border flex flex-col items-center">
            <span class="text-sm font-bold text-primary">${formatDate(q.last_solved_at)}</span>
            <span class="text-[10px] text-muted font-bold">최근 풀이</span>
          </div>
        </div>
        <div class="mt-8">
          <p class="text-[10px] font-bold text-muted uppercase mb-2">해설 및 정답 힌트</p>
          <div class="markdown-body prose prose-slate prose-italic max-w-none bg-accent/5 p-6 rounded-2xl border border-accent/10 text-secondary">${renderedHint}</div>
        </div>
      `;
    }
  }

  async function updateQuestion(event) {
    event.preventDefault();
    const form = event.target;
    const btn = document.getElementById('update-btn');
    if (!btn) return;
    const originalText = btn.innerText;
    btn.disabled = true;
    btn.innerText = '저장 중...';
    try {
      const formData = new FormData(form);
      const cleanContent = formData.get('content').replace(/!\[.*?\]\(.*?\)/g, "").trim();
      let finalOptions = null;
      let finalAnswer = null;
      if (currentDetailQuestion.question_type === 'MULTIPLE_CHOICE') {
        const optionInputs = form.querySelectorAll('input[name="edit_option_text"]');
        finalOptions = Array.from(optionInputs).map(input => input.value.trim()).filter(v => v !== '');
        const selectedRadio = form.querySelector('input[name="edit_correct_answer"]:checked');
        finalAnswer = selectedRadio ? selectedRadio.value : (currentDetailQuestion.answer || '0');
      } else {
        // v91: 저장 형식을 [ "전체 텍스트" ] 배열 형태로 통일
        const rawText = formData.get('edit_answer_text') || '';
        finalAnswer = [rawText.trim()];
      }
      const data = {
        id: formData.get('id'),
        major_subject: formData.get('major_subject'),
        minor_subject: formData.get('minor_subject'),
        question_title: formData.get('question_title'),
        content: cleanContent,
        image_url: currentDetailQuestion.image_url,
        image_position: formData.get('image_position'),
        remove_image: formData.get('remove_image') === 'true',
        hint_explanation: formData.get('hint_explanation'),
        question_type: currentDetailQuestion.question_type,
        options: finalOptions,
        answer: finalAnswer
      };
      const imageFile = formData.get('imageFile');
      if (imageFile && imageFile.size > 0) {
        data.base64_image = await toBase64(imageFile);
        data.image_filename = imageFile.name;
      }
      google.script.run
        .withSuccessHandler((response) => {
          btn.disabled = false;
          btn.innerText = originalText;
          if (response && response.status === 'success') {
            alert('수정되었습니다.');
            // v58: 수정 성공 시 전역 캐시 즉시 리로드
            loadGlobalData(() => {
              backToList();
              loadManageList();
            }, true);
          } else { alert('수정 실패: ' + response.message); }
        })
        .withFailureHandler(() => {
          btn.disabled = false;
          btn.innerText = originalText;
          alert('서버 오류');
        })
        .updateQuestion(data);
    } catch (e) {
      btn.disabled = false;
      btn.innerText = originalText;
      alert('오류 발생');
    }
  }

  function deleteQuestion(id) {
    if (!confirm('정말로 이 문제를 삭제하시겠습니까?')) return;
    google.script.run
      .withSuccessHandler((response) => {
        if (response && response.status === 'success') {
          alert('삭제되었습니다.');
          // v58: 삭제 성공 시 전역 캐시 즉시 리로드 (동기화 포함)
          loadGlobalData(() => {
            loadManageList();
          }, true);
        } else { alert('삭제 실패: ' + (response ? response.message : '알 수 없는 오류')); }
      })
      .deleteQuestion(id);
  }

  function removeImageFromQuestion() {
    if (!confirm('현재 이미지를 제거하시겠습니까? (저장 시 반영)')) return;
    const flagInput = document.getElementById('remove-image-flag');
    if (flagInput) flagInput.value = 'true';
    const preview = document.getElementById('current-image-preview');
    if (preview) preview.innerHTML = '<p class="text-[10px] text-red-500 font-bold">이미지 삭제 예정 (저장 버튼을 눌러주세요)</p>';
  }

  function addOptionToEdit() {
    const list = document.getElementById('edit-options-list');
    if (!list) return;
    const idx = list.children.length;
    const div = document.createElement('div');
    div.className = 'flex items-center gap-2';
    div.innerHTML = `
      <input type="radio" name="edit_correct_answer" value="${idx}">
      <input type="text" name="edit_option_text" placeholder="새 보기 입력" class="flex-1 px-3 py-1.5 border border-border rounded-lg text-sm bg-surface">
      <button type="button" onclick="this.parentElement.remove()" class="text-red-400">✕</button>`;
    list.appendChild(div);
  }

  function cancelEdit() {
    isEditMode = false;
    updateEditToggleUI(false);
    renderDetailContent(currentDetailQuestion, false);
  }
</script>
