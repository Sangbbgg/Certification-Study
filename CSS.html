<style>
  /* 
    커스텀 CSS 정의 
    메인 레이아웃 및 여백 등은 Tailwind CSS로 처리하고, 추가적인 트랜지션 및 
    스타일 최적화 관련 로직만 반영합니다.
  */
  
  /* SPA 라우팅 시 페이드 인 애니메이션 효과 */
  .fade-in {
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  
  @keyframes fadeIn {
    from { 
      opacity: 0; 
      transform: translateY(10px); 
    }
    to { 
      opacity: 1; 
      transform: translateY(0); 
    }
  }

  /* 부드러운 스크롤 */
  html, body {
    scroll-behavior: smooth;
    -webkit-tap-highlight-color: transparent; /* 터치 기기에서 영역 클릭 시 반짝임 방지 */
  }

  /* 커스텀 스크롤바 디자인 */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent; 
  }
  ::-webkit-scrollbar-thumb {
    background: #cbd5e1; 
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #94a3b8; 
  }
  /* Markdown 스타일링 */
  .markdown-body {
    line-height: 1.6;
    word-wrap: break-word;
  }
  .markdown-body p {
    margin-bottom: 0.8rem;
  }
  .markdown-body strong {
    color: #1e293b;
    font-weight: 800;
  }
  .markdown-body em {
    color: #475569;
    font-style: italic;
  }
  .markdown-body img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    margin: 1.5rem auto;
    display: block;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    border: 4px solid #fff;
  }
  .markdown-body code {
    background: #f1f5f9;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    font-size: 0.85em;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    color: #3b82f6;
  }
  .markdown-body pre {
    background: #1e293b;
    color: #f8fafc;
    padding: 1.25rem;
    border-radius: 12px;
    overflow-x: auto;
    margin: 1rem 0;
  }
  .markdown-body pre code {
    background: transparent;
    padding: 0;
    color: inherit;
  }
  .markdown-body ul, .markdown-body ol {
    margin-bottom: 0.8rem;
    padding-left: 1.5rem;
  }
  .markdown-body ul { list-style-type: disc; }
  .markdown-body ol { list-style-type: decimal; }

  /* 그림자 효과 보강 */
  .shadow-inner-sm {
    box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.03);
  }
</style>
