        extend: {
          screens: {

            bg: '#f8fafc',        // slate-50

            accent: '#3b82f6',    // blue-500

      }

  <!-- Custom CSS -->
  <?!= include('CSS'); ?>
</head>
<body class="bg-bg text-text font-sans h-screen flex flex-col fold:flex-row overflow-hidden">
  
  <!-- GNB 영역 (모바일: 상단바 + 하단탭, 폴드/PC: 좌측 사이드바) -->
  <aside class="flex-shrink-0 bg-surface border-border flex flex-col fold:border-r fold:w-64 lg:w-72 shadow-sm fold:shadow-none z-20 transition-all duration-300">
    
    <!-- 해더/심볼 부분 -->
    <div class="h-14 fold:h-16 flex items-center justify-center fold:justify-start fold:px-6 border-b border-border bg-white sticky top-0">
      <h1 class="text-lg fold:text-xl font-bold text-primary tracking-wide">학습 보조 시스템</h1>
    </div>

    <!-- 네비게이션: 모바일은 하단 고정, 폴드/PC는 좌측 메뉴 -->
    <nav id="nav-menu" class="fixed bottom-0 left-0 right-0 bg-surface border-t border-border fold:relative fold:border-t-0 fold:flex-1 fold:flex fold:flex-col fold:px-4 fold:py-6 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] fold:shadow-none z-50 flex justify-around fold:justify-start">
      
      <button onclick="navigate('write')" class="tab-btn flex flex-col fold:flex-row items-center fold:justify-start py-3 fold:py-3 fold:px-4 fold:mb-2 w-full fold:w-auto text-primary font-bold fold:bg-slate-100 fold:rounded-lg focus:outline-none transition-colors duration-200 group" id="tab-write">
        <svg class="w-6 h-6 fold:mr-3 fold:w-5 fold:h-5 mb-1 fold:mb-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
        <span class="text-xs fold:text-base">문제 작성</span>
      </button>
      
      <button onclick="navigate('analyze')" class="tab-btn flex flex-col fold:flex-row items-center fold:justify-start py-3 fold:py-3 fold:px-4 fold:mb-2 w-full fold:w-auto text-muted hover:text-primary fold:hover:bg-slate-50 fold:rounded-lg focus:outline-none transition-colors duration-200 group" id="tab-analyze">
        <svg class="w-6 h-6 fold:mr-3 fold:w-5 fold:h-5 mb-1 fold:mb-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        <span class="text-xs fold:text-base">학습 분석</span>
      </button>

      <button onclick="navigate('solve')" class="tab-btn flex flex-col fold:flex-row items-center fold:justify-start py-3 fold:py-3 fold:px-4 fold:mb-2 w-full fold:w-auto text-muted hover:text-primary fold:hover:bg-slate-50 fold:rounded-lg focus:outline-none transition-colors duration-200 group" id="tab-solve">
        <svg class="w-6 h-6 fold:mr-3 fold:w-5 fold:h-5 mb-1 fold:mb-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        <span class="text-xs fold:text-base">문제풀이</span>
      </button>
      
      <button onclick="navigate('exam')" class="tab-btn flex flex-col fold:flex-row items-center fold:justify-start py-3 fold:py-3 fold:px-4 fold:mb-2 w-full fold:w-auto text-muted hover:text-primary fold:hover:bg-slate-50 fold:rounded-lg focus:outline-none transition-colors duration-200 group" id="tab-exam">
        <svg class="w-6 h-6 fold:mr-3 fold:w-5 fold:h-5 mb-1 fold:mb-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        <span class="text-xs fold:text-base">모의시험</span>
      </button>

    </nav>
  </aside>

  <!-- 메인 콘텐츠 영역 -->
  <main class="flex-1 overflow-auto bg-bg h-[calc(100vh-56px-70px)] fold:h-screen w-full relative">
    <div id="main-container" class="max-w-5xl mx-auto p-4 fold:p-8 pb-24 fold:pb-8 fade-in-container">
      <!-- 이 영역의 DOM 요소가 JS에 의해 SPA 방식으로 교체됩니다 -->
    </div>
  </main>

  <!-- Templates for SPA Pages -->
  <template id="page-write-template">
    <div class="fade-in space-y-6">
      <h2 class="text-2xl font-bold tracking-tight text-primary">문제 작성</h2>
      <div class="p-6 bg-surface rounded-xl border border-border shadow-sm">
        <p class="text-sm font-semibold text-secondary mb-5 border-b border-border pb-2">기본 정보 입력</p>
        <form id="question-form" onsubmit="submitQuestion(event)" class="space-y-5">
          <!-- 과목명 -->
          <div>
            <label for="subject" class="block text-sm font-medium text-text mb-1">과목명</label>
            <input type="text" id="subject" name="subject" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-shadow" placeholder="예: 정보처리기사">
          </div>
          <!-- 문제 내용 -->
          <div>
            <label for="content" class="block text-sm font-medium text-text mb-1">문제 내용</label>
            <textarea id="content" name="content" rows="4" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-shadow resize-y" placeholder="문제를 입력하세요"></textarea>
          </div>
          <!-- 보기 1~4 -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="option1" class="block text-sm font-medium text-text mb-1">보기 1</label>
              <input type="text" id="option1" name="option1" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-shadow">
            </div>
            <div>
              <label for="option2" class="block text-sm font-medium text-text mb-1">보기 2</label>
              <input type="text" id="option2" name="option2" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-shadow">
            </div>
            <div>
              <label for="option3" class="block text-sm font-medium text-text mb-1">보기 3</label>
              <input type="text" id="option3" name="option3" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-shadow">
            </div>
            <div>
              <label for="option4" class="block text-sm font-medium text-text mb-1">보기 4</label>
              <input type="text" id="option4" name="option4" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-shadow">
            </div>
          </div>
          <!-- 정답 -->
          <div>
            <label for="answer" class="block text-sm font-medium text-text mb-1">정답 선택</label>
            <select id="answer" name="answer" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent bg-white cursor-pointer transition-shadow">
              <option value="" disabled selected>정답을 선택하세요</option>
              <option value="1">보기 1</option>
              <option value="2">보기 2</option>
              <option value="3">보기 3</option>
              <option value="4">보기 4</option>
            </select>
          </div>
          <!-- 해설 -->
          <div>
            <label for="explanation" class="block text-sm font-medium text-text mb-1">해설</label>
            <textarea id="explanation" name="explanation" rows="3" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-shadow resize-y" placeholder="문제에 대한 해설을 입력하세요"></textarea>
          </div>
          <!-- 이미지 첨부 -->
          <div>
            <label for="imageFile" class="block text-sm font-medium text-text mb-1">이미지 첨부 (선택)</label>
            <input type="file" id="imageFile" name="imageFile" accept="image/*" class="w-full text-sm text-secondary file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-slate-100 file:text-primary hover:file:bg-slate-200 transition-colors cursor-pointer">
          </div>
          <!-- 폼 전송 액션 -->
          <div class="pt-4 flex justify-end">
            <button type="submit" id="submit-btn" class="bg-accent hover:bg-blue-600 text-white font-bold py-2.5 px-6 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
              문제 저장
            </button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <!-- Custom JS -->
  <?!= include('JS'); ?>
</body>
</html>
