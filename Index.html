<body class="bg-bg text-text font-sans h-screen flex flex-col fold:flex-row overflow-hidden">

      <button onclick="navigate('write')" class="tab-btn flex flex-col fold:flex-row items-center fold:justify-start py-3 fold:py-3 fold:px-4 fold:mb-2 w-full fold:w-auto text-primary font-bold fold:bg-slate-100 fold:rounded-lg focus:outline-none transition-colors duration-200 group" id="tab-write">
        <svg class="w-6 h-6 fold:mr-3 fold:w-5 fold:h-5 mb-1 fold:mb-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
        <span class="text-xs fold:text-base">문제 작성</span>
      </button>
      
      <button onclick="navigate('analyze')" class="tab-btn flex flex-col fold:flex-row items-center fold:justify-start py-3 fold:py-3 fold:px-4 fold:mb-2 w-full fold:w-auto text-muted hover:text-primary fold:hover:bg-slate-50 fold:rounded-lg focus:outline-none transition-colors duration-200 group" id="tab-analyze">
        <svg class="w-6 h-6 fold:mr-3 fold:w-5 fold:h-5 mb-1 fold:mb-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>

      <button onclick="navigate('solve')" class="tab-btn flex flex-col fold:flex-row items-center fold:justify-start py-3 fold:py-3 fold:px-4 fold:mb-2 w-full fold:w-auto text-muted hover:text-primary fold:hover:bg-slate-50 fold:rounded-lg focus:outline-none transition-colors duration-200 group" id="tab-solve">
        <svg class="w-6 h-6 fold:mr-3 fold:w-5 fold:h-5 mb-1 fold:mb-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        <span class="text-xs fold:text-base">문제풀이</span>
      </button>
      
      <button onclick="navigate('exam')" class="tab-btn flex flex-col fold:flex-row items-center fold:justify-start py-3 fold:py-3 fold:px-4 fold:mb-2 w-full fold:w-auto text-muted hover:text-primary fold:hover:bg-slate-50 fold:rounded-lg focus:outline-none transition-colors duration-200 group" id="tab-exam">
        <svg class="w-6 h-6 fold:mr-3 fold:w-5 fold:h-5 mb-1 fold:mb-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        <span class="text-xs fold:text-base">모의시험</span>
      </button>

    </nav>
  </aside>

  <!-- 메인 콘텐츠 영역 -->
  <main class="flex-1 overflow-auto bg-bg h-[calc(100vh-56px-70px)] fold:h-screen w-full relative">
    <div id="main-container" class="max-w-5xl mx-auto p-4 fold:p-8 pb-24 fold:pb-8 fade-in-container">
      <!-- 이 영역의 DOM 요소가 JS에 의해 SPA 방식으로 교체됩니다 -->
    </div>
  </main>

  <!-- Templates for SPA Pages -->
  <template id="page-analyze-template">
    <div class="fade-in space-y-6">
      <h2 class="text-2xl font-bold tracking-tight text-primary">문제관리 & 분석</h2>
      
      <!-- 리스트 영역 -->
      <div id="manage-list-area" class="p-6 bg-surface rounded-xl border border-border shadow-sm">
        <div class="flex justify-between items-center mb-5 border-b border-border pb-2">
          <p class="text-sm font-semibold text-secondary">문제 목록</p>
          <button onclick="loadManageList()" class="text-xs bg-slate-100 hover:bg-slate-200 text-primary px-3 py-1.5 rounded transition-colors flex items-center">
            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            새로고침
          </button>
        </div>

        <!-- 필터 영역 추가 -->
        <div class="flex flex-wrap gap-4 mb-6 p-4 bg-slate-50 rounded-xl border border-dashed border-border">
          <div class="flex-1 min-w-[200px]">
            <label class="block text-[10px] font-bold text-muted uppercase tracking-tight mb-1 ml-1">대분류 필터</label>
            <select id="filter-major" onchange="applyFilters()" class="w-full px-3 py-2 border border-border rounded-lg text-sm bg-white focus:ring-1 focus:ring-accent outline-none">
              <option value="">전체 대분류</option>
            </select>
          </div>
          <div class="flex-1 min-w-[200px]">
            <label class="block text-[10px] font-bold text-muted uppercase tracking-tight mb-1 ml-1">소분류 필터</label>
            <select id="filter-minor" onchange="applyFilters()" class="w-full px-3 py-2 border border-border rounded-lg text-sm bg-white focus:ring-1 focus:ring-accent outline-none">
              <option value="">전체 소분류</option>
            </select>
          </div>
        </div>
        
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left">
            <thead>
              <tr class="text-xs text-muted uppercase border-b border-border">
                <th class="px-4 py-3 font-medium">문제명</th>
                <th class="px-4 py-3 font-medium text-center">최종 풀이</th>
                <th class="px-4 py-3 font-medium text-center">정답률</th>
                <th class="px-4 py-3 font-medium text-right">관리</th>
              </tr>
            </thead>
            <tbody id="manage-list-body" class="divide-y divide-border">
              <!-- JS에서 동적 생성 -->
              <tr>
                <td colspan="4" class="px-4 py-10 text-center text-muted">데이터를 불러오는 중...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 상세 및 수정 영역 (초기 숨김) -->
      <div id="manage-detail-area" class="p-6 bg-surface rounded-xl border border-border shadow-sm space-y-6" style="display: none;">
        <div class="flex justify-between items-center border-b border-border pb-2">
          <button onclick="backToList()" class="text-sm text-secondary hover:text-primary flex items-center transition-colors">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            목록으로 돌아가기
          </button>
          <div class="flex items-center space-x-3">
            <span class="text-sm font-medium text-text">수정 모드</span>
            <button onclick="toggleEditMode()" id="edit-toggle" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-slate-200">
              <span id="edit-toggle-slider" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-0"></span>
            </button>
          </div>
        </div>

        <form id="edit-question-form" onsubmit="updateQuestion(event)" class="space-y-5">
          <input type="hidden" id="edit-id" name="id">
          <!-- 상세 내용 렌더링 (JS) -->
          <div id="detail-content-wrapper" class="space-y-5">
             <!-- view-mode와 edit-mode가 공존하며 toggle에 의해 제어됨 -->
          </div>
          
          <div id="edit-actions" class="pt-4 flex justify-end space-x-3" style="display: none;">
            <button type="button" onclick="cancelEdit()" class="px-4 py-2 border border-border rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors">취소</button>
            <button type="submit" id="update-btn" class="bg-accent hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-lg shadow-sm transition-all duration-200">수정 사항 저장</button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <template id="page-write-template">
    <div class="fade-in space-y-6">
      <h2 class="text-2xl font-bold tracking-tight text-primary">문제 작성</h2>
      <div class="p-6 bg-surface rounded-xl border border-border shadow-sm">
        <p class="text-sm font-semibold text-secondary mb-5 border-b border-border pb-2">문제 상세 정보 입력</p>
        <form id="question-form" onsubmit="submitQuestion(event)" class="space-y-5">
          
          <!-- 과목 정보 -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="major_subject" class="block text-sm font-medium text-text mb-1">대과목 <span class="text-red-500">*</span></label>
              <input type="text" id="major_subject" name="major_subject" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-shadow" placeholder="예: 정보처리기사">
            </div>
            <div>
              <label for="minor_subject" class="block text-sm font-medium text-text mb-1">소과목 <span class="text-red-500">*</span></label>
              <input type="text" id="minor_subject" name="minor_subject" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-shadow" placeholder="예: 소프트웨어 설계">
            </div>
          </div>

          <!-- 문제 제목 -->
          <div>
            <label for="question_title" class="block text-sm font-medium text-text mb-1">문제명 <span class="text-red-500">*</span></label>
            <input type="text" id="question_title" name="question_title" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-shadow" placeholder="예: 다음 중 객체지향의 특징이 아닌 것은?">
          </div>

          <!-- 문제 유형 -->
          <div>
            <label for="question_type" class="block text-sm font-medium text-text mb-1">문제 유형 <span class="text-red-500">*</span></label>
            <select id="question_type" name="question_type" onchange="toggleOptionsArea()" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent bg-white cursor-pointer transition-shadow">
              <option value="MULTIPLE_CHOICE" selected>객관식 (MULTIPLE_CHOICE)</option>
              <option value="SHORT_ANSWER">단답/서술형 (SHORT_ANSWER)</option>
              <option value="FIND_AND_FILL">보기에서 찾아넣기 (FIND_AND_FILL)</option>
            </select>
          </div>

          <!-- 지문 -->
          <div>
            <label for="content" class="block text-sm font-medium text-text mb-1">지문 (Markdown 지원) <span class="text-red-500">*</span></label>
            <textarea id="content" name="content" rows="4" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-shadow resize-y" placeholder="문제 지문을 입력하세요 (코드, 설명 등)"></textarea>
          </div>

          <!-- 이미지 첨부 및 위치 설정 -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 bg-slate-50 rounded-lg border border-border">
            <div>
              <label for="imageFile" class="block text-sm font-medium text-text mb-1">첨부 이미지</label>
              <input type="file" id="imageFile" name="imageFile" accept="image/*" class="w-full text-xs text-secondary file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-slate-200 file:text-primary hover:file:bg-slate-300 transition-colors cursor-pointer">
            </div>
            <div>
              <label for="image_position" class="block text-sm font-medium text-text mb-1">이미지 표시 위치</label>
              <select id="image_position" name="image_position" class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent bg-white cursor-pointer transition-shadow">
                <option value="TOP">상단 (지문 위)</option>
                <option value="BOTTOM" selected>하단 (지문 아래)</option>
              </select>
            </div>
          </div>

          <!-- 역동적인 보기 영역 (객관식일 때만 표시) -->
          <div id="options-area" class="space-y-3 bg-slate-50 p-4 rounded-lg border border-border">
            <div class="flex justify-between items-center mb-2">
              <p class="text-sm font-medium text-text">보기 설정 (객관식 전용)</p>
              <button type="button" onclick="addOption()" class="text-xs bg-accent hover:bg-blue-600 text-white px-2 py-1 rounded shadow-sm transition-colors">+ 추가</button>
            </div>
            <div id="options-container" class="space-y-2">
              <!-- JS에서 동적으로 보기 항목과 정답(Radio) 라디오 버튼 생성 -->
            </div>
          </div>

          <!-- 역동적인 찾아넣기 영역 (FIND_AND_FILL 일 때만 표시) -->
          <div id="blanks-area" class="space-y-3 bg-slate-50 p-4 rounded-lg border border-border" style="display: none;">
            <div class="flex justify-between items-center mb-2">
              <p class="text-sm font-medium text-text">빈칸(구역) 정답 설정 (순서대로)</p>
              <button type="button" onclick="addBlank()" class="text-xs bg-accent hover:bg-blue-600 text-white px-2 py-1 rounded shadow-sm transition-colors">+ 구역 추가</button>
            </div>
            <div id="blanks-container" class="space-y-2">
              <!-- JS에서 동적으로 구역별 정답 Input 생성 -->
            </div>
          </div>

          <!-- 단답형 정답 (SHORT_ANSWER 일 때만 표시) -->
          <div id="short-answer-area" style="display: none;">
            <label for="short_answer" class="block text-sm font-medium text-text mb-1">정답 <span class="text-red-500">*</span></label>
            <input type="text" id="short_answer" name="short_answer" class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-shadow" placeholder="다중 허용 정답일 경우 콤마(,)로 구분해 입력하세요.">
          </div>
          
          <!-- 힌트 및 해설 -->
          <div>
            <label for="hint_explanation" class="block text-sm font-medium text-text mb-1">힌트 및 해설 (Markdown 지원) <span class="text-red-500">*</span></label>
            <textarea id="hint_explanation" name="hint_explanation" rows="3" required class="w-full px-4 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-shadow resize-y" placeholder="문제에 대한 힌트 및 해설을 입력하세요"></textarea>
          </div>

          <!-- 폼 전송 액션 -->
          <div class="pt-4 flex justify-end">
            <button type="submit" id="submit-btn" class="bg-accent hover:bg-blue-600 text-white font-bold py-2.5 px-6 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
              문제 저장
            </button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <!-- Custom JS -->
  <?!= include('JS'); ?>
</body>
</html>
