<!-- 헤더 -->

<main class="main">
  <!-- ── 설정 화면 ── -->
  <div id="setupScreen">
    <div class="setup-panel">
      <h2>🎯 문제 설정</h2>

      <div class="filter-grid">
        <div class="filter-group">
          <label>대분류</label>
          <select id="selMajor" onchange="onMajorChange()">
            <option value="">전체</option>
          </select>
        </div>
        <div class="filter-group">
          <label>소분류</label>
          <select id="selMinor">
            <option value="">전체</option>
          </select>
        </div>
        <div class="filter-group">
          <label>문제 유형</label>
          <select id="selType">
            <option value="">전체</option>
            <option value="SHORT_ANSWER">단답형/서술형</option>
            <option value="FIND_AND_FILL">빈칸채우기</option>
          </select>
        </div>
        <div class="filter-group">
          <label>문제 수</label>
          <input type="number" id="countInput" value="10" min="1" max="50">
        </div>
      </div>

      <div class="mode-cards">
        <div class="mode-card selected" data-mode="random" onclick="selectMode(this)">
          <div class="mode-icon">🔀</div>
          <div class="mode-name">랜덤</div>
          <div class="mode-desc">무작위 출제</div>
        </div>
        <div class="mode-card" data-mode="weak" onclick="selectMode(this)">
          <div class="mode-icon">💪</div>
          <div class="mode-name">약점 집중</div>
          <div class="mode-desc">정답률 낮은 순</div>
        </div>
        <div class="mode-card" data-mode="order" onclick="selectMode(this)">
          <div class="mode-icon">📋</div>
          <div class="mode-name">순서대로</div>
          <div class="mode-desc">처음부터 순서대로</div>
        </div>
      </div>

      <div class="stats-row" id="statsRow">
        <div class="stat-chip">불러오는 중...</div>
      </div>

      <button class="start-btn" id="startBtn" onclick="startSolve()">🚀 시작하기</button>
    </div>
  </div>

  <!-- ── 문제 풀기 화면 ── -->
  <div id="solveScreen" class="solve-screen">
    <!-- 진행 상황 -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
      <button class="nav-tab" onclick="endSession()">종료</button>
    </div>

    <!-- 문제 카드 -->
    <div class="question-card" id="questionCard">
      <div class="question-meta" id="questionMeta"></div>
      <div class="question-num" id="questionNum"></div>
      <div class="question-title" id="questionTitle"></div>
      <div class="question-content" id="questionContent"></div>

      <div class="answer-section">
        <h3>✏️ 내 답안</h3>
        <div id="answerInput"></div>
      </div>

      <div class="action-row" id="actionRow">
        <button class="btn btn-skip" onclick="skipQuestion()">건너뛰기</button>
        <button class="btn btn-submit" onclick="submitAnswer()">제출</button>
      </div>

      <div class="result-box" id="resultBox">
        <div class="result-status" id="resultStatus"></div>
        <div class="correct-answer-label">정답</div>
        <div class="correct-answer" id="correctAnswer"></div>
      </div>
    </div>
  </div>

  <!-- ── 결과 화면 ── -->
  <div id="resultScreen" class="result-screen">
    <div class="result-summary">
      <div class="result-score" id="finalScore">0<span>점</span></div>
      <div class="result-label" id="finalLabel"></div>
      <div class="result-grid">
        <div class="result-stat correct">
          <div class="val" id="finalCorrect">0</div>
          <div class="lbl">정답</div>
        </div>
        <div class="result-stat wrong">
          <div class="val" id="finalWrong">0</div>
          <div class="lbl">오답</div>
        </div>
        <div class="result-stat skipped">
          <div class="val" id="finalSkipped">0</div>
          <div class="lbl">건너뜀</div>
        </div>
      </div>
      <button class="retry-btn" onclick="retrySession()">🔄 다시 풀기</button>
      <button class="retry-btn outline" onclick="goSetup()">⚙️ 설정 변경</button>
    </div>
  </div>

  <!-- 로딩 -->
  <div id="loadingDiv" class="loading" style="display:none">
    <div class="spinner"></div>
    문제를 불러오는 중...
  </div>
</main>

<script>
// ── 전역 상태 ────────────────────────────────────────────────
const GAS_URL = ''; // Google Apps Script Web App URL (배포 후 입력)
let subjects    = {};
let questions   = [];
let curIdx      = 0;
let selectedMode = 'random';
let session     = { correct: 0, wrong: 0, skipped: 0 };
let answered    = false;

// ── 초기화 ──────────────────────────────────────────────────
window.onload = () => {
  loadSubjects();
};

async function loadSubjects() {
  try {
    const data = await apiGet('getSubjects');
    subjects = data.data || {};
    const selMajor = document.getElementById('selMajor');
    Object.keys(subjects).sort().forEach(major => {
      const opt = document.createElement('option');
      opt.value = major;
      opt.textContent = major;
      selMajor.appendChild(opt);
    });
    await loadStats();
  } catch (e) {
    console.error('loadSubjects:', e);
    setStats([{ label: '연결 오류', value: 'GAS URL을 확인하세요' }]);
  }
}

function onMajorChange() {
  const major = document.getElementById('selMajor').value;
  const selMinor = document.getElementById('selMinor');
  selMinor.innerHTML = '<option value="">전체</option>';
  if (major && subjects[major]) {
    subjects[major].sort().forEach(minor => {
      const opt = document.createElement('option');
      opt.value = minor;
      opt.textContent = minor;
      selMinor.appendChild(opt);
    });
  }
  loadStats();
}

async function loadStats() {
  const major = document.getElementById('selMajor').value;
  const minor = document.getElementById('selMinor').value;
  try {
    const data = await apiGet('getSubjectStats');
    let stats = data.data || [];
    if (major) stats = stats.filter(s => s.major_subject === major);
    if (minor) stats = stats.filter(s => s.minor_subject === minor);

    const total  = stats.reduce((a, s) => a + (s.total_questions || 0), 0);
    const solved = stats.reduce((a, s) => a + (s.total_attempts  || 0), 0);
    const avgAcc = stats.length
      ? Math.round(stats.filter(s => s.avg_accuracy).reduce((a, s) => a + (s.avg_accuracy || 0), 0) / stats.length)
      : 0;

    document.getElementById('statsRow').innerHTML = `
      <div class="stat-chip">총 <strong>${total}</strong>문제</div>
      <div class="stat-chip">풀이 <strong>${solved}</strong>회</div>
      ${avgAcc ? `<div class="stat-chip">평균 정답률 <strong>${avgAcc}%</strong></div>` : ''}
    `;
  } catch (e) {
    document.getElementById('statsRow').innerHTML =
      `<div class="stat-chip">통계를 불러올 수 없습니다</div>`;
  }
}

function selectMode(el) {
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedMode = el.dataset.mode;
}

// ── 문제 풀기 시작 ───────────────────────────────────────────
async function startSolve() {
  const major = document.getElementById('selMajor').value;
  const minor = document.getElementById('selMinor').value;
  const qtype = document.getElementById('selType').value;
  const count = parseInt(document.getElementById('countInput').value) || 10;

  showLoading(true);
  try {
    const payload = { major_subject: major || undefined,
                      minor_subject: minor || undefined,
                      question_type: qtype || undefined,
                      count, mode: selectedMode };
    const res = await apiPost('getQuestionsForSolve', payload);
    questions = res.data || [];

    if (!questions.length) {
      alert('해당 조건에 맞는 문제가 없습니다. 필터를 변경해보세요.');
      showLoading(false);
      return;
    }

    curIdx = 0;
    session = { correct: 0, wrong: 0, skipped: 0 };
    showScreen('solve');
    renderQuestion();
  } catch (e) {
    alert('문제를 불러오지 못했습니다: ' + e.message);
  }
  showLoading(false);
}

// ── 문제 렌더링 ──────────────────────────────────────────────
function renderQuestion() {
  if (curIdx >= questions.length) {
    showResult();
    return;
  }

  const q = questions[curIdx];
  answered = false;

  // 진행 상황
  const pct = Math.round((curIdx / questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${curIdx + 1} / ${questions.length}`;

  // 메타
  document.getElementById('questionMeta').innerHTML = `
    <span class="badge badge-major">${q.major_subject}</span>
    <span class="badge badge-minor">${q.minor_subject}</span>
    <span class="badge badge-type">${typeLabel(q.question_type)}</span>
  `;

  document.getElementById('questionNum').textContent = q.question_title.split('.')[0] + '번';
  document.getElementById('questionTitle').textContent =
    q.question_title.replace(/^\d+\.\s*/, '');

  // 내용 (제목과 첫 줄 중복 제거)
  const content = q.content || '';
  const firstLine = content.split('\n')[0].trim();
  const titleText = q.question_title.replace(/^\d+\.\s*/, '').trim();
  const restContent = firstLine === titleText
    ? content.split('\n').slice(1).join('\n').trim()
    : content;

  const contentEl = document.getElementById('questionContent');
  if (restContent) {
    // ''' → ``` 변환 후 marked 로 렌더링 (코드블록 지원)
    if (typeof marked !== 'undefined') {
      try {
        const converted = restContent.replace(/'''/g, '```');
        contentEl.innerHTML = marked.parse(converted);
        contentEl.className = 'question-content';
      } catch(e) {
        contentEl.textContent = restContent;
        contentEl.className = 'question-content plain-text';
      }
    } else {
      contentEl.textContent = restContent;
      contentEl.className = 'question-content plain-text';
    }
    contentEl.style.display = '';
  } else {
    contentEl.style.display = 'none';
  }

  // 답안 입력 UI
  renderAnswerInput(q);

  // 결과 초기화
  const rb = document.getElementById('resultBox');
  rb.style.display = 'none';
  rb.className = 'result-box';

  document.getElementById('actionRow').innerHTML = `
    <button class="btn btn-skip" onclick="skipQuestion()">건너뛰기</button>
    <button class="btn btn-submit" onclick="submitAnswer()">제출</button>
  `;
}

function renderAnswerInput(q) {
  const container = document.getElementById('answerInput');
  const ans = q.answer || {};
  const keys = Object.keys(ans).filter(k => k !== 'text');

  if (q.question_type === 'MULTIPLE_CHOICE' && q.options && q.options.length > 0) {
    // 객관식 — 보기 버튼 목록
    const nums = ['①','②','③','④','⑤','⑥'];
    container.innerHTML = '<div class="options-list">' +
      q.options.map((opt, i) =>
        `<button type="button" class="option-btn" data-index="${i}" onclick="selectOption(this)">
          <span class="opt-num">${nums[i] || (i+1)}</span>
          <span>${opt}</span>
        </button>`
      ).join('') + '</div>';

  } else if (q.question_type === 'FIND_AND_FILL' && keys.length > 0) {
    // 빈칸채우기 — ①②③ 입력
    const circleNums = '①②③④⑤⑥⑦⑧⑨⑩';
    container.innerHTML = '<div class="fill-grid">' +
      keys.map((k, i) => {
        const label = isNaN(k) ? k : (circleNums[parseInt(k)-1] || k);
        return `<div class="fill-item">
          <label>${label}</label>
          <input type="text" id="fill_${k}" placeholder="답 입력..." autocomplete="off">
        </div>`;
      }).join('') + '</div>';

  } else {
    // 단답/서술형
    container.innerHTML = `
      <textarea class="answer-textarea" id="mainAnswer"
        placeholder="정답을 입력하세요."></textarea>
    `;
  }
}

function selectOption(btn) {
  const list = btn.closest('.options-list');
  if (!list) return;
  list.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function typeLabel(t) {
  return t === 'SHORT_ANSWER' ? '단답형' :
         t === 'FIND_AND_FILL' ? '빈칸채우기' : '객관식';
}

// ── 답안 제출 ────────────────────────────────────────────────
function submitAnswer() {
  if (answered) return;
  const q = questions[curIdx];
  const userAns = getUserAnswer(q);
  const isCorrect = checkAnswer(userAns, q.answer || {});

  answered = true;
  if (isCorrect) session.correct++;
  else           session.wrong++;

  showResultBox(isCorrect, q.answer || {});

  // GAS에 기록 (실패해도 무시)
  apiPost('submitAnswer', {
    question_id:    q.id,
    user_answer:    userAns,
    correct_answer: q.answer
  }).catch(() => {});

  document.getElementById('actionRow').innerHTML = `
    <button class="btn btn-next" onclick="nextQuestion()">
      ${curIdx + 1 < questions.length ? '다음 문제 →' : '결과 보기'}
    </button>
  `;
}

function getUserAnswer(q) {
  const ans = q.answer || {};

  // 객관식 — 선택된 보기 텍스트 반환
  if (q.question_type === 'MULTIPLE_CHOICE') {
    const selected = document.querySelector('.option-btn.selected');
    if (!selected) return '';
    const idx = parseInt(selected.dataset.index, 10);
    return (q.options && q.options[idx]) ? q.options[idx] : '';
  }

  // 빈칸채우기 — 키별 입력값 객체
  const keys = Object.keys(ans).filter(k => k !== 'text');
  if (q.question_type === 'FIND_AND_FILL' && keys.length > 0) {
    const result = {};
    keys.forEach(k => {
      const el = document.getElementById('fill_' + k);
      if (el) result[k] = el.value.trim();
    });
    return result;
  }

  // 단답/서술형
  const el = document.getElementById('mainAnswer');
  return el ? el.value.trim() : '';
}

function checkAnswer(userAns, correctAns) {
  if (!correctAns) return false;
  const norm = s => String(s||'').trim().toLowerCase().replace(/\s+/g,' ');

  // 레거시: 배열 형식 (구버전 Page_Write 저장 데이터)
  if (Array.isArray(correctAns)) {
    const u = norm(userAns);
    return correctAns.some(a => norm(a) === u);
  }

  // { text: "..." } — 객관식·단답형
  if (correctAns.text) {
    const u = norm(userAns);
    const c = norm(correctAns.text);
    return u === c || c.includes(u) || u.includes(c.split(' ')[0]);
  }

  // { "1": "...", "2": "..." } — 빈칸채우기
  if (typeof userAns === 'object' && userAns !== null && !Array.isArray(userAns)) {
    const keys = Object.keys(correctAns);
    if (!keys.length) return false;
    const matched = keys.filter(k => norm(userAns[k]||'') === norm(correctAns[k]||''));
    return matched.length === keys.length;
  }

  return false;
}

function showResultBox(isCorrect, correctAns) {
  const rb = document.getElementById('resultBox');
  rb.className = 'result-box ' + (isCorrect ? 'correct' : 'wrong');
  rb.style.display = 'block';
  document.getElementById('resultStatus').textContent = isCorrect ? '✅ 정답!' : '❌ 오답';
  document.getElementById('correctAnswer').textContent = formatAnswer(correctAns);
}

function formatAnswer(ans) {
  if (!ans) return '-';
  // 레거시 배열 형식
  if (Array.isArray(ans)) return ans.join(', ');
  // { text: "..." }
  if (ans.text) return ans.text;
  // { "1": "...", "2": "..." }
  const keys = Object.keys(ans).sort();
  const circleNums = '①②③④⑤⑥⑦⑧⑨⑩';
  return keys.map(k => {
    const label = isNaN(k) ? k : (circleNums[parseInt(k)-1] || k);
    return `${label} ${ans[k]}`;
  }).join('\n');
}

function skipQuestion() {
  session.skipped++;
  nextQuestion();
}

function nextQuestion() {
  curIdx++;
  if (curIdx >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ── 결과 화면 ───────────────────────────────────────────────
function showResult() {
  const total = session.correct + session.wrong + session.skipped;
  const score = total > 0 ? Math.round((session.correct / (total - session.skipped)) * 100) : 0;

  document.getElementById('finalScore').innerHTML = `${score}<span>점</span>`;
  document.getElementById('finalLabel').textContent =
    `총 ${total}문제 중 ${session.correct}개 정답 (건너뜀 ${session.skipped}개)`;
  document.getElementById('finalCorrect').textContent  = session.correct;
  document.getElementById('finalWrong').textContent    = session.wrong;
  document.getElementById('finalSkipped').textContent  = session.skipped;

  showScreen('result');
}

function retrySession() {
  curIdx = 0;
  session = { correct: 0, wrong: 0, skipped: 0 };
  // 랜덤 모드면 셔플
  if (selectedMode === 'random') questions.sort(() => Math.random() - 0.5);
  showScreen('solve');
  renderQuestion();
}

function goSetup() {
  showScreen('setup');
  loadStats();
}

function endSession() {
  if (confirm('세션을 종료하고 결과를 확인할까요?')) showResult();
}

// ── API 통신 ────────────────────────────────────────────────
async function apiGet(action, params = {}) {
  // GAS_URL이 설정된 경우 fetch 사용, 아니면 google.script.run
  if (GAS_URL) {
    const url = new URL(GAS_URL);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => v && url.searchParams.set(k, v));
    const res = await fetch(url.toString());
    return res.json();
  }
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      .routeGet(action, params);
  });
}

async function apiPost(action, payload) {
  if (GAS_URL) {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, payload })
    });
    return res.json();
  }
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      .router({ action, payload });
  });
}

// ── UI 헬퍼 ─────────────────────────────────────────────────
function showScreen(name) {
  document.getElementById('setupScreen').style.display = name === 'setup' ? '' : 'none';
  document.getElementById('solveScreen').style.display = name === 'solve' ? '' : 'none';
  document.getElementById('resultScreen').style.display = name === 'result' ? '' : 'none';
  document.getElementById('solveScreen').className = name === 'solve' ? 'solve-screen' : 'solve-screen';
  if (name === 'solve') document.getElementById('solveScreen').style.display = '';
}

function showLoading(show) {
  document.getElementById('loadingDiv').style.display = show ? '' : 'none';
  document.getElementById('startBtn').disabled = show;
}

function showSection(s) {}

  // ── 페이지 초기화 (navigate('solve') 또는 자동 실행)
  function initSolvePage() {
    showScreen('setup');
    loadSubjects();
  }

  // 자동 초기화 (template inject 후 script 실행 시 즉시 호출)
  initSolvePage();
</script>
