<template id="page-solve-template">
  <div class="fade-in space-y-6">
    <div class="flex justify-between items-center">
      <h2 class="text-2xl font-bold tracking-tight text-primary">문제풀이</h2>
      <div id="solve-progress"
        class="text-sm font-medium text-secondary bg-bg px-3 py-1 rounded-full border border-border">
        로드 중...
      </div>
    </div>

    <!-- 필터 및 정렬 영역 (v모바일최적화: 접기/펴기 추가) -->
    <div class="bg-surface rounded-xl border border-border shadow-sm overflow-hidden">
      <button onclick="toggleSolveFilterArea()" class="w-full flex justify-between items-center px-4 py-3 bg-bg/50 hover:bg-bg transition-colors">
        <div class="flex items-center text-sm font-bold text-secondary">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
          문제 필터 및 정렬
        </div>
        <svg id="solve-filter-arrow" class="w-4 h-4 text-muted transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </button>
      
      <div id="solve-filter-content" class="hidden max-h-0 transition-all duration-300 ease-in-out border-t border-border">
        <div class="p-4 grid grid-cols-1 sm:grid-cols-3 gap-4 bg-bg/30">
          <div class="space-y-1">
            <label class="block text-[10px] font-bold text-muted uppercase tracking-tight ml-1">대분류</label>
            <select id="solve-filter-major" onchange="onSolveMajorChange()"
              class="w-full px-3 py-2 border border-border rounded-lg text-sm bg-surface focus:ring-1 focus:ring-accent outline-none">
              <option value="">전체 대분류</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="block text-[10px] font-bold text-muted uppercase tracking-tight ml-1">소분류</label>
            <select id="solve-filter-minor" onchange="onSolveMinorChange()"
              class="w-full px-3 py-2 border border-border rounded-lg text-sm bg-surface focus:ring-1 focus:ring-accent outline-none">
              <option value="">전체 소분류</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="block text-[10px] font-bold text-muted uppercase tracking-tight ml-1">정렬 기준</label>
            <select id="solve-sort-order" onchange="initSolvePage(false)"
              class="w-full px-3 py-2 border border-border rounded-lg text-sm bg-surface focus:ring-1 focus:ring-accent outline-none">
              <option value="oldest">오래된순</option>
              <option value="newest">최근순</option>
              <option value="accuracy">정답률 저조순</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- 문제 표시 카드 -->
    <div id="solve-card" class="p-6 bg-surface rounded-xl border border-border shadow-sm min-h-[400px] flex flex-col">
      <div id="question-display-area" class="flex-1 space-y-6">
        <!-- JS에서 동적 렌더링 -->
        <div class="animate-pulse space-y-4">
          <div class="h-4 bg-muted/20 rounded w-1/4"></div>
          <div class="h-8 bg-muted/20 rounded w-3/4"></div>
          <div class="h-32 bg-muted/20 rounded"></div>
        </div>
      </div>

      <!-- 답안 입력 영역 -->
      <div id="answer-input-area" class="mt-8 pt-6 border-t border-border">
        <!-- JS에서 문제 유형별 UI 주입 -->
      </div>

      <!-- 액션 버튼 (v모바일최적화: 2라인 레이아웃) -->
      <div class="mt-6 border-t border-border pt-6 space-y-3">
        <!-- 윗라인: 이전/다음 및 정답제출 -->
        <div class="flex flex-wrap items-center gap-2">
          <div class="flex flex-1 space-x-2">
            <button id="prev-question-btn" onclick="loadPrevQuestion()"
              class="flex-1 bg-bg text-secondary font-bold py-2.5 rounded-lg border border-border hover:bg-muted/10 transition-colors disabled:opacity-30 text-sm">
              이전
            </button>
            <button id="next-question-btn" onclick="loadNextQuestion()"
              class="flex-1 bg-secondary text-white font-bold py-2.5 rounded-lg shadow-sm border border-secondary hover:bg-secondary/90 transition-colors disabled:opacity-30 text-sm">
              다음
            </button>
          </div>
          <button id="submit-answer-btn" onclick="handleSolveSubmission()"
            class="flex-1 sm:flex-initial bg-accent text-white font-bold py-2.5 px-8 rounded-lg shadow-sm disabled:opacity-50 text-base">
            정답 제출
          </button>
        </div>

        <!-- 아래라인: 힌트 및 계산장 -->
        <div class="flex space-x-2">
          <button id="hint-btn" onclick="toggleSolveHint()"
            class="flex-1 bg-bg text-accent font-bold py-2 rounded-lg border border-accent/20 hover:bg-accent/5 transition-all flex items-center justify-center text-xs">
            <svg class="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
              </path>
            </svg>
            힌트/해설
          </button>
          <button id="scratchpad-toggle-btn" onclick="toggleScratchpad()"
            class="flex-1 bg-bg text-secondary font-bold py-2 rounded-lg border border-border hover:text-accent hover:border-accent/40 transition-all flex items-center justify-center text-xs">
            <svg class="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
            </svg>
            계산장
          </button>
        </div>
      </div>
    </div>

    <!-- 결과 및 해설 영역 (초기 숨김) -->
    <div id="solve-result-area" class="hidden p-6 bg-accent/10 rounded-xl border border-accent/20 space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-2">
          <div id="result-status-icon"></div>
          <h4 id="result-status-text" class="text-lg font-bold"></h4>
        </div>
        <button id="edit-explanation-btn" onclick="toggleSolveExplanationEdit(true)" class="text-[10px] font-bold text-muted hover:text-accent flex items-center bg-bg px-2 py-1 rounded border border-border">
          <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
          수정
        </button>
      </div>
      <div id="correct-answer-display"
        class="text-sm font-semibold text-primary py-2 px-4 bg-surface rounded-lg border border-accent/30">
        <!-- 정답 텍스트 -->
      </div>
      <div class="relative group">
        <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-2">해설</p>
        <div id="solve-explanation-content" class="markdown-body prose prose-slate max-w-none text-secondary text-sm">
          <!-- 해설 렌더링 -->
        </div>
        <div id="solve-explanation-edit-area" class="hidden space-y-3">
          <div class="flex justify-between items-end mb-1">
            <span class="text-[10px] font-bold text-muted uppercase tracking-tight">수정 중...</span>
            <button type="button" onclick="openMarkdownPreview('solve-explanation-textarea')"
              class="text-[10px] bg-bg text-accent border border-accent/30 px-2 py-0.5 rounded hover:bg-accent hover:text-white transition-all flex items-center">
              <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
              미리보기
            </button>
          </div>
          <textarea id="solve-explanation-textarea" rows="8" class="w-full px-3 py-2 border border-border rounded-lg text-sm bg-surface focus:ring-1 focus:ring-accent outline-none font-mono" placeholder="해설을 입력하세요 (마크다운 지원)"></textarea>
          <div class="flex justify-end space-x-2">
            <button onclick="toggleSolveExplanationEdit(false)" class="text-xs font-bold text-muted px-3 py-1.5 rounded-lg border border-border hover:bg-bg">취소</button>
            <button id="save-explanation-btn" onclick="saveSolveExplanation()" class="text-xs font-bold text-white bg-accent px-4 py-1.5 rounded-lg shadow-sm">저장하기</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 계산장 컨테이너 (v추가) -->
  <div id="scratchpad-container" class="hidden opacity-0">
    <canvas id="scratchpad-canvas"></canvas>
    <div id="scratchpad-controls">
      <!-- 드로잉 모드 -->
      <button onclick="setScratchpadMode('draw')" id="sp-draw-btn" class="scratchpad-btn active" title="그리기">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
      </button>
      <button onclick="setScratchpadMode('erase')" id="sp-erase-btn" class="scratchpad-btn" title="지우개">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
      </button>
      
      <div class="sp-thickness-indicator"></div>

      <!-- 색상 선택 -->
      <div class="sp-color-btn-group flex flex-col gap-3 py-1">
        <div onclick="setScratchpadColor('')" id="sp-color-default" class="sp-color-btn active" style="background: var(--accent);" title="기본색"></div>
        <div onclick="setScratchpadColor('#EF4444')" id="sp-color-red" class="sp-color-btn" style="background: #EF4444;" title="빨강"></div>
        <div onclick="setScratchpadColor('#3B82F6')" id="sp-color-blue" class="sp-color-btn" style="background: #3B82F6;" title="파랑"></div>
        <div onclick="setScratchpadColor('#F59E0B')" id="sp-color-yellow" class="sp-color-btn" style="background: #F59E0B;" title="노랑"></div>
      </div>

      <div class="sp-thickness-indicator"></div>

      <!-- 두께 조절 (회전된 슬라이더) -->
      <div class="thickness-slider-container flex flex-col items-center">
        <span class="text-[10px] font-bold text-muted mb-1">두께</span>
        <input type="range" min="1" max="20" value="2" class="thickness-slider" oninput="setScratchpadThickness(this.value)">
      </div>

      <div class="sp-thickness-indicator"></div>

      <button onclick="clearScratchpad()" class="scratchpad-btn" title="모두 지우기">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
      </button>
      <button onclick="toggleScratchpad()" class="scratchpad-btn bg-red-500/10 text-red-500" title="닫기">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
  </div>
</template>

<script>
  /**
   * 문제풀이 모듈 로직
   */
  var solveQuestions = [];
  var currentSolveIndex = 0;
  var allSolveReference = []; // 필터링용 전체 데이터 참조 (v56 글로벌 데이터 연동)
  
  // 계산장 상태 변수 (v추가)
  var isScratchpadInited = false;
  var isDrawing = false;
  var lastX = 0;
  var lastY = 0;
  var spMode = 'draw'; // 'draw' | 'erase'
  var spColor = '';    // 기본색 (자동 연동)
  var spThickness = 2; // 기본 두께

  /**
   * 필터 영역 토글 (v모바일최적화)
   */
  function toggleSolveFilterArea() {
    var content = document.getElementById('solve-filter-content');
    var arrow = document.getElementById('solve-filter-arrow');
    if (!content) return;
    
    var isHidden = content.classList.contains('hidden');
    if (isHidden) {
      content.classList.remove('hidden');
      setTimeout(function() {
        content.style.maxHeight = '500px';
        arrow.style.transform = 'rotate(180deg)';
      }, 10);
    } else {
      content.style.maxHeight = '0';
      arrow.style.transform = 'rotate(0)';
      setTimeout(function() {
        content.classList.add('hidden');
      }, 300);
    }
  }

  function initSolvePage(forceRefresh) {
    var majorFilter = document.getElementById('solve-filter-major');
    var minorFilter = document.getElementById('solve-filter-minor');
    var sortSelect = document.getElementById('solve-sort-order');
    var major_val = majorFilter ? majorFilter.value : '';
    var minor_val = minorFilter ? minorFilter.value : '';
    var sort_val = sortSelect ? sortSelect.value : 'oldest';

    console.log('[DEBUG] Solve Page Init - payload:', { major: major_val, minor: minor_val, sort: sort_val });

    // 글로벌 데이터 확인 및 연동
    if (typeof allQuestions === 'undefined' || allQuestions.length === 0) {
      console.warn('[DEBUG] Global data not found. Fetching...');
      loadGlobalData(function () { initSolvePage(false); });
      return;
    }

    // 1. 글로벌 데이터에서 필터링
    var filtered = allQuestions.slice(); // 복사본 사용
    if (major_val) {
      filtered = filtered.filter(function (q) { return q.major_subject === major_val; });
    }
    if (minor_val) {
      filtered = filtered.filter(function (q) { return q.minor_subject === minor_val; });
    }

    // 2. 정렬 로직 적용 (v66)
    filtered.sort(function (a, b) {
      if (sort_val === 'newest') {
        return new Date(b.created_at) - new Date(a.created_at);
      } else if (sort_val === 'accuracy') {
        var rateA = (a.correct_rate !== undefined && a.correct_rate !== null) ? a.correct_rate : 100;
        var rateB = (b.correct_rate !== undefined && b.correct_rate !== null) ? b.correct_rate : 100;
        return rateA - rateB; // 정답률 낮은 순
      } else { // oldest (기본값)
        return new Date(a.created_at) - new Date(b.created_at);
      }
    });

    solveQuestions = filtered;
    currentSolveIndex = 0;

    // 3. 필터 참조 데이터 및 UI 업데이트
    allSolveReference = allQuestions;

    // 필터 옵션 초기화 (최초 1회 또는 강제 갱신 시)
    if (forceRefresh || (majorFilter && majorFilter.options.length <= 1)) {
      updateSolveFilterOptions();
    }

    // 4. 즉시 렌더링
    console.log('[DEBUG] Solve Page: Items loaded with sort (' + sort_val + '):', solveQuestions.length);

    if (solveQuestions.length > 0) {
      renderCurrentQuestion();
    } else {
      var displayArea = document.getElementById('question-display-area');
      if (displayArea) {
        displayArea.innerHTML = '<div class="text-center py-20 text-muted">조건에 맞는 문제가 없습니다. 필터를 변경해 보세요.</div>';
      }
      var progressText = document.getElementById('solve-progress');
      if (progressText) progressText.innerText = '0 / 0';
      var inputArea = document.getElementById('answer-input-area');
      if (inputArea) inputArea.innerHTML = '';
    }
  }

  function updateSolveFilterOptions() {
    var majorSelect = document.getElementById('solve-filter-major');
    if (!majorSelect) return;

    // 전역 allQuestions가 있으면 그것을 참조, 없으면 solve용 데이터 참조
    var referenceData = (typeof allQuestions !== 'undefined' && allQuestions.length > 0) ? allQuestions : allSolveReference;
    if (referenceData.length === 0) return;

    var currentMajor = majorSelect.value;
    var majors = [];
    referenceData.forEach(function (q) {
      if (majors.indexOf(q.major_subject) === -1) majors.push(q.major_subject);
    });
    majors.sort();

    majorSelect.innerHTML = '<option value="">전체 대분류</option>' +
      majors.map(function (m) { return '<option value="' + m + '"' + (m === currentMajor ? ' selected' : '') + '>' + m + '</option>'; }).join('');

    onSolveMajorChange();
  }

  function onSolveMinorChange() {
    var majorSelect = document.getElementById('solve-filter-major');
    var minorSelect = document.getElementById('solve-filter-minor');
    var minor = minorSelect.value;

    var referenceData = (typeof allQuestions !== 'undefined' && allQuestions.length > 0) ? allQuestions : allSolveReference;

    if (minor && referenceData.length > 0) {
      var matched = referenceData.find(function (q) { return q.minor_subject === minor; });
      if (matched && majorSelect.value !== matched.major_subject) {
        majorSelect.value = matched.major_subject;
        // v64/v66: 대분류 변경 시 소분류 리스트 재구성만 하고, 값은 유지
        onSolveMajorChangeInternal();
        minorSelect.value = minor;
      }
    }
    initSolvePage(false); // v66: 변경 즉시 갱신
  }

  function onSolveMajorChange() {
    onSolveMajorChangeInternal();
    initSolvePage(false); // v66: 변경 즉시 갱신
  }

  function onSolveMajorChangeInternal() {
    var majorSelect = document.getElementById('solve-filter-major');
    var minorSelect = document.getElementById('solve-filter-minor');
    if (!majorSelect || !minorSelect) return;

    // v64: 대분류 변경 시 소분류를 '전체'("")로 초기화
    minorSelect.value = "";

    var selectedMajor = majorSelect.value;
    var currentMinor = minorSelect.value;
    var minors = [];

    var referenceData = (typeof allQuestions !== 'undefined' && allQuestions.length > 0) ? allQuestions : allSolveReference;

    referenceData.forEach(function (q) {
      if (!selectedMajor || q.major_subject === selectedMajor) {
        if (minors.indexOf(q.minor_subject) === -1) minors.push(q.minor_subject);
      }
    });
    minors.sort();

    minorSelect.innerHTML = '<option value="">전체 소분류</option>' +
      minors.map(function (m) { return '<option value="' + m + '"' + (m === currentMinor ? ' selected' : '') + '>' + m + '</option>'; }).join('');
  }

  function renderCurrentQuestion() {
    if (currentSolveIndex >= solveQuestions.length) {
      showSolveComplete();
      return;
    }

    var q = solveQuestions[currentSolveIndex];
    var displayArea = document.getElementById('question-display-area');
    var inputArea = document.getElementById('answer-input-area');
    var progressText = document.getElementById('solve-progress');
    var resultArea = document.getElementById('solve-result-area');
    var submitBtn = document.getElementById('submit-answer-btn');
    var nextBtn = document.getElementById('next-question-btn');
    var prevBtn = document.getElementById('prev-question-btn');

    // UI 상태 초기화
    resultArea.classList.add('hidden');
    toggleSolveExplanationEdit(false); // 수정 모드 초기화 (v추가)
    submitBtn.classList.remove('hidden');
    submitBtn.disabled = false;

    // 내비게이션 버튼 상태 업데이트 (v90 대응)
    if (prevBtn) prevBtn.disabled = (currentSolveIndex === 0);
    if (nextBtn) {
      nextBtn.classList.remove('hidden');
      nextBtn.disabled = (currentSolveIndex >= solveQuestions.length - 1);
      // 마지막 문제일 때는 '다음 문제' 대신 '완료' 느낌을 줄 수도 있지만 일단 비활성화 유지
    }

    progressText.innerText = (currentSolveIndex + 1) + ' / ' + solveQuestions.length;

    // 1. 문제 지문 및 이미지 렌더링
    var contentHtml = q.content || '';
    var imageHtml = '';
    if (q.image_url) {
      var finalImageUrl = q.image_url;
      var match = q.image_url.match(/(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})/);
      if (match && q.image_url.indexOf('google') !== -1) finalImageUrl = 'https://lh3.googleusercontent.com/d/' + match[1];
      imageHtml = '<div class="flex justify-center my-4"><img src="' + finalImageUrl + '" class="rounded-xl border border-border shadow-md max-w-full h-auto max-h-64"></div>';
    }

    if (typeof marked !== 'undefined') {
      contentHtml = marked.parse(contentHtml.replace(/'''/g, '```'));
    }

    displayArea.innerHTML = [
      '<div class="flex flex-wrap gap-2 mb-3">',
      '<span class="px-2 py-0.5 bg-bg text-secondary rounded text-[10px] font-bold uppercase tracking-wider">' + (q.major_subject || '') + '</span>',
      '<span class="px-2 py-0.5 bg-bg text-secondary rounded text-[10px] font-bold tracking-wider border border-border">' + (q.minor_subject || '') + '</span>',
      '<span class="px-2 py-0.5 bg-accent/10 text-accent rounded text-[10px] font-bold uppercase tracking-wider border border-accent/20">' + (q.question_type || '') + '</span>',
      '</div>',
      '<h3 class="text-xl font-bold text-primary mb-4 leading-tight">' + (q.question_title || '') + '</h3>',
      '<div class="space-y-4">',
      (q.image_position === 'TOP' ? imageHtml : ''),
      '<div class="markdown-body prose prose-slate max-w-none text-secondary text-sm leading-relaxed">',
      contentHtml,
      '</div>',
      (q.image_position !== 'TOP' ? imageHtml : ''),
      '</div>'
    ].join('');

    // 2. 문제 유형별 입력 UI 주입
    inputArea.innerHTML = '';
    if (q.question_type === 'MULTIPLE_CHOICE') {
      var options = q.options || [];
      var list = document.createElement('div');
      list.className = 'space-y-2';
      options.forEach(function (opt, idx) {
        var item = document.createElement('label');
        item.className = 'flex items-center p-3 border border-border rounded-lg cursor-pointer hover:bg-bg transition-colors group';
        item.innerHTML = [
          '<input type="radio" name="user-answer" value="' + opt + '" class="w-4 h-4 text-accent border-gray-300 focus:ring-accent cursor-pointer">',
          '<span class="ml-3 text-sm text-secondary group-hover:text-primary transition-colors">' + opt + '</span>'
        ].join('');
        list.appendChild(item);
      });
      inputArea.appendChild(list);

    } else if (q.question_type === 'FIND_AND_FILL') {
      var expectedCount = Array.isArray(q.answer) ? q.answer.length : 1;
      var grid = document.createElement('div');
      grid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3';
      for (var i = 0; i < expectedCount; i++) {
        var div = document.createElement('div');
        div.className = 'flex items-center space-x-2';
        div.innerHTML = [
          '<span class="text-xs font-bold text-muted bg-bg w-8 h-8 flex items-center justify-center rounded-lg border border-border">' + (i + 1) + '</span>',
          '<input type="text" name="user-answer" class="flex-1 px-3 py-2 border border-border rounded-lg text-sm bg-surface focus:ring-1 focus:ring-accent outline-none" placeholder="정답 입력">'
        ].join('');
        grid.appendChild(div);
      }
      inputArea.appendChild(grid);

    } else { // SHORT_ANSWER
      var input = document.createElement('textarea');
      input.name = 'user-answer';
      input.rows = 3;
      input.className = 'w-full px-4 py-3 border border-border rounded-lg text-sm focus:ring-1 focus:ring-accent outline-none resize-y';
      input.placeholder = '정답을 입력하세요 (줄바꿈 가능, 여러 개인 경우 콤마로 구분)';
      // textarea에서는 Enter가 줄바꿈이므로 별도의 submit 처리는 버튼 클릭으로 유도하거나 Ctrl+Enter 등으로 처리 가능하나 여기선 기본 유지
      inputArea.appendChild(input);
    }
  }

  function handleSolveSubmission() {
    var q = solveQuestions[currentSolveIndex];
    if (!q) return;

    var userAnswer = null;
    if (q.question_type === 'MULTIPLE_CHOICE') {
      var selected = document.querySelector('input[name="user-answer"]:checked');
      if (!selected) { alert('답안을 선택해주세요.'); return; }
      userAnswer = [selected.value];
    } else if (q.question_type === 'FIND_AND_FILL') {
      var inputs = document.querySelectorAll('input[name="user-answer"]');
      userAnswer = Array.prototype.map.call(inputs, function (i) { return i.value.trim(); });
      if (userAnswer.some(function (v) { return v === ''; })) { alert('모든 빈칸을 채워주세요.'); return; }
    } else {
      var input = document.querySelector('textarea[name="user-answer"]') || document.querySelector('input[name="user-answer"]');
      if (!input || !input.value.trim()) { alert('답안을 입력해주세요.'); return; }
      // v90/v91: 콤마(,)로 분리하지 않고 전체 텍스트를 하나의 답변으로 처리 (정답 데이터 형식과 통일)
      userAnswer = [input.value.trim()];
    }

    var btn = document.getElementById('submit-answer-btn');
    btn.disabled = true;

    // 1. 클라이언트 측 즉시 채점 (반응성 강화)
    var isCorrect = false;
    // 줄바꿈 정규화 함수 (v줄바꿈대응)
    function normalizeStr(s) {
      if (s === undefined || s === null) return '';
      // 모든 종류의 줄바꿈을 \n으로 통일하고 양 끝 공백 제거
      return String(s).replace(/\r\n|\r/g, '\n').trim();
    }

    // 1. 데이터 정규화 (배열 여부와 상관없이 비교 준비)
    var uArr = (userAnswer || []).map(normalizeStr);
    var uSingle = uArr[0] || '';

    var cArr = Array.isArray(q.answer) ? q.answer : [q.answer];
    var cNormalized = cArr.map(normalizeStr);
    var cCombined = cNormalized.join(','); // 콤마로 합친 버전 (구버전 대응)
    var cCombinedSpace = cNormalized.join(', '); // 콤마+공백 합친 버전

    // 2. 문제 유형별 채점 로직
    if (q.question_type === 'SHORT_ANSWER') {
      // 케이스 1: 전체 문자열이 일치하는지 (단일 정답 혹은 합쳐진 정답)
      if (uSingle === cNormalized.join('\n') || uSingle === cCombined || uSingle === cCombinedSpace) {
        isCorrect = true;
      }
      // 케이스 2: 배열 요소 중 하나라도 일치하는지 (허용 정답/유사어 대응)
      else if (cNormalized.some(function (v) { return v === uSingle; })) {
        isCorrect = true;
      }
    } else {
      // 객관식, 빈칸넣기 등 (기존 로직 유지)
      isCorrect = (uArr.length === cNormalized.length && uArr.every(function (v, i) { return v === cNormalized[i]; }));
      if (!isCorrect && uArr.length === 1) isCorrect = cNormalized.some(function (v) { return v === uArr[0]; });
    }

    // UI 즉시 반영
    showSolveResult(isCorrect, q);

    // 2. 서버에는 백그라운드로 이력 저장 (비동기 처리 느낌)
    google.script.run
      .withSuccessHandler(function (response) {
        console.log('[DEBUG] Server record saved:', response);
        if (response && response.status === 'success') {
          isGlobalDataDirty = true; // 정답 제출 성공 시 분석 데이터 최신화 필요 마킹 (v58)
        } else {
          console.error('이력 저장 중 오류 발생:', (response ? response.message : '알 수 없는 오류'));
        }
      })
      .router({
        action: 'submitAnswer',
        payload: {
          question_id: q.id,
          user_answer: userAnswer,
          is_correct: isCorrect // 이미 채점된 결과 전달로 서버 부하 감소
        }
      });
  }

  function showSolveResult(isCorrect, q) {
    var resultArea = document.getElementById('solve-result-area');
    var statusIcon = document.getElementById('result-status-icon');
    var statusText = document.getElementById('result-status-text');
    var answerDisplay = document.getElementById('correct-answer-display');
    var explanationContent = document.getElementById('solve-explanation-content');
    var submitBtn = document.getElementById('submit-answer-btn');
    var nextBtn = document.getElementById('next-question-btn');

    resultArea.classList.remove('hidden');
    // 정답 제출 후에도 다음 문제 버튼은 유지됨 (이미 render에서 상태 제어)

    if (isCorrect) {
      statusIcon.innerHTML = '<svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>';
      statusText.innerText = '정답입니다!';
      statusText.className = 'text-lg font-bold text-green-600';
      resultArea.classList.toggle('bg-accent/10', false);
      resultArea.classList.toggle('bg-green-500/10', true);
      resultArea.classList.toggle('border-accent/20', false);
      resultArea.classList.toggle('border-green-500/20', true);
    } else {
      statusIcon.innerHTML = '<svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>';
      statusText.innerText = '오답입니다.';
      statusText.className = 'text-lg font-bold text-red-600';
      resultArea.classList.toggle('bg-green-500/10', false);
      resultArea.classList.toggle('bg-red-500/10', true);
      resultArea.classList.toggle('border-green-500/20', false);
      resultArea.classList.toggle('border-red-500/20', true);
    }

    var correctAns = Array.isArray(q.answer) ? q.answer.join(', ') : q.answer;
    answerDisplay.innerHTML = '<span class="text-[10px] text-muted mr-2">정답:</span> <span class="text-accent font-black whitespace-pre-wrap">' + correctAns + '</span>';
    answerDisplay.classList.remove('hidden');

    var explanation = q.hint_explanation || '해설이 등록되지 않았습니다.';
    if (typeof marked !== 'undefined') {
      explanation = marked.parse(explanation.replace(/'''/g, '```'));
    }
    explanationContent.innerHTML = explanation;

    resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /**
   * 해설 수정 모드 토글 (v추가)
   */
  function toggleSolveExplanationEdit(isEdit) {
    var viewArea = document.getElementById('solve-explanation-content');
    var editArea = document.getElementById('solve-explanation-edit-area');
    var editBtn = document.getElementById('edit-explanation-btn');
    var textarea = document.getElementById('solve-explanation-textarea');
    
    if (!viewArea || !editArea || !editBtn) return;
    
    if (isEdit) {
      var q = solveQuestions[currentSolveIndex];
      textarea.value = q.hint_explanation || '';
      viewArea.classList.add('hidden');
      editArea.classList.remove('hidden');
      editBtn.classList.add('hidden');
    } else {
      viewArea.classList.remove('hidden');
      editArea.classList.add('hidden');
      editBtn.classList.remove('hidden');
      if (typeof closeMarkdownPreview === 'function') closeMarkdownPreview(); // 수정 종료 시 미리보기 닫기 (v추가)
    }
  }

  /**
   * 수정한 해설 서버 저장 (v추가)
   */
  function saveSolveExplanation() {
    var q = solveQuestions[currentSolveIndex];
    if (!q) return;
    
    var newText = document.getElementById('solve-explanation-textarea').value;
    var saveBtn = document.getElementById('save-explanation-btn');
    
    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.innerText = '저장 중...';
    }
    
    google.script.run
      .withSuccessHandler(function(response) {
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.innerText = '저장하기';
        }
        
        if (response && response.status === 'success') {
          // 로컬 데이터 업데이트
          q.hint_explanation = newText;
          // 전역 올데이터 업데이트 (v53/v56 연동)
          if (typeof allQuestions !== 'undefined') {
            var globalQ = allQuestions.find(function(item) { return item.id === q.id; });
            if (globalQ) globalQ.hint_explanation = newText;
          }
          
          alert('해설이 성공적으로 수정되었습니다.');
          toggleSolveExplanationEdit(false);
          
          // 수정한 내용 즉시 렌더링 반영
          var explanationContent = document.getElementById('solve-explanation-content');
          var rendered = newText || '해설이 등록되지 않았습니다.';
          if (typeof marked !== 'undefined') {
            rendered = marked.parse(rendered.replace(/'''/g, '```'));
          }
          explanationContent.innerHTML = rendered;
        } else {
          alert('저장 실패: ' + (response ? response.message : '서버 오류'));
        }
      })
      .withFailureHandler(function(err) {
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.innerText = '저장하기';
        }
        alert('서버 통신 오류가 발생했습니다.');
      })
      .router({
        action: 'updateQuestion',
        payload: {
          id: q.id,
          major_subject: q.major_subject,
          minor_subject: q.minor_subject,
          question_title: q.question_title,
          content: q.content,
          question_type: q.question_type,
          options: q.options,
          answer: q.answer,
          image_url: q.image_url,
          image_position: q.image_position,
          hint_explanation: newText 
        }
      });
  }

      currentSolveIndex--;

  /**
   * 계산장 초기화 및 핸들러 (v추가)
   */
  function initScratchpad() {
    var canvas = document.getElementById('scratchpad-canvas');
    if (!canvas) return;
    
    var ctx = canvas.getContext('2d');
    
    // 캔버스 크기 조절
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      // 리사이즈 시 기존 그림이 지워지지 않게 하려면 메모리 캔버스가 필요하지만 여기선 단순화
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    // 드로잉 로직
    function startDrawing(e) {
      isDrawing = true;
      var pos = getEventPos(e);
      lastX = pos.x;
      lastY = pos.y;
    }
    
    function draw(e) {
      if (!isDrawing) return;
      var pos = getEventPos(e);
      
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      
      if (spMode === 'erase') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = spThickness * 5; // 지우개는 더 두껍게
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = spColor || (document.documentElement.classList.contains('dark') ? '#8AB4F8' : '#1A73E8');
        ctx.lineWidth = spThickness;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }
      
      ctx.stroke();
      lastX = pos.x;
      lastY = pos.y;
    }
    
    function stopDrawing() {
      isDrawing = false;
    }
    
    function getEventPos(e) {
      var clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
      var clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
      return { x: clientX, y: clientY };
    }
    
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);
    
    // 터치 지원
    canvas.addEventListener('touchstart', function(e) { e.preventDefault(); startDrawing(e); }, {passive: false});
    canvas.addEventListener('touchmove', function(e) { e.preventDefault(); draw(e); }, {passive: false});
    canvas.addEventListener('touchend', stopDrawing);
    
    isScratchpadInited = true;
  }

  function toggleScratchpad() {
    var container = document.getElementById('scratchpad-container');
    var btn = document.getElementById('scratchpad-toggle-btn');
    if (!container) return;
    
    var isOpen = !container.classList.contains('hidden');
    
    if (isOpen) {
      // 닫기
      container.classList.add('opacity-0');
      setTimeout(function() { 
        container.classList.add('hidden');
        container.classList.remove('active');
      }, 300);
      btn.innerHTML = '<svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>계산장 열기';
      btn.classList.remove('bg-accent/10', 'text-accent');
    } else {
      // 열기
      if (!isScratchpadInited) initScratchpad();
      container.classList.remove('hidden');
      container.classList.add('active');
      setTimeout(function() { container.classList.remove('opacity-0'); }, 10);
      btn.innerHTML = '<svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>계산장 닫기';
      btn.classList.add('bg-accent/10', 'text-accent');
    }
  }

  function setScratchpadMode(mode) {
    spMode = mode;
    document.getElementById('sp-draw-btn').classList.toggle('active', mode === 'draw');
    document.getElementById('sp-erase-btn').classList.toggle('active', mode === 'erase');
  }

  function setScratchpadColor(color) {
    spColor = color;
    // UI 업데이트
    document.querySelectorAll('.sp-color-btn').forEach(function(el) { el.classList.remove('active'); });
    if (color === '') document.getElementById('sp-color-default').classList.add('active');
    else if (color === '#EF4444') document.getElementById('sp-color-red').classList.add('active');
    else if (color === '#3B82F6') document.getElementById('sp-color-blue').classList.add('active');
    else if (color === '#F59E0B') document.getElementById('sp-color-yellow').classList.add('active');
    
    // 그리기 모드로 자동 전환
    setScratchpadMode('draw');
  }

  function setScratchpadThickness(val) {
    spThickness = parseInt(val);
  }

  function clearScratchpad() {
    var canvas = document.getElementById('scratchpad-canvas');
    if (canvas) {
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
